<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chit &amp; Bridge — Know your business</title>
<style>
  :root{ --ink:#1b2431; --grey:#6a7686; --line:#e5e8ee; --bg:#f5f6f9; --card:#fff; --blue:#3F66A6;
    --ok:#2f7a45; --warn:#b4832a; --bad:#c0453b; --verified:#2f8f5b; --documented:#c98a1a; --declared:#8a94a6; --wall:#7a6d5e; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); }
  .wrap{ max-width:820px; margin:0 auto; padding:16px; }
  h1{ font-size:20px; margin:4px 0 2px; } .sub{ font-size:12.5px; color:var(--grey); margin-bottom:14px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:13px; padding:14px 15px; margin-bottom:12px; }
  label{ font-size:11px; font-weight:700; color:var(--grey); display:block; margin:8px 0 3px; }
  input,select{ width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px; font-size:13px; }
  button{ font-size:13px; font-weight:700; border:0; border-radius:9px; padding:9px 15px; cursor:pointer; }
  .pri{ background:var(--blue); color:#fff; } .gh{ background:#fff; color:var(--ink); border:1px solid var(--line); }
  .row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .tabs{ display:flex; gap:4px; margin:6px 0 12px; flex-wrap:wrap; }
  .tab{ font-size:12.5px; font-weight:700; padding:8px 13px; border-radius:9px; cursor:pointer; background:#eef1f6; color:var(--grey); border:1px solid transparent; }
  .tab.on{ background:#fff; color:var(--blue); border-color:var(--blue); }
  .sec{ font-size:11px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:var(--grey); margin:14px 2px 8px; }
  .cred{ display:flex; align-items:center; gap:9px; padding:9px 0; border-top:1px solid var(--line); }
  .cred .nm{ flex:1; min-width:0; font-weight:600; font-size:13px; }
  .rung{ font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.03em; border-radius:6px; padding:2px 7px; }
  .r-verified{ background:#eaf6ee; color:var(--verified); } .r-documented{ background:#faf3dd; color:var(--documented); }
  .r-declared{ background:#eef0f3; color:var(--declared); } .r-null{ background:#f3f4f6; color:#aab; }
  .exp{ font-size:10px; font-weight:700; border-radius:5px; padding:2px 6px; }
  .exp.soon{ background:#fdf3e3; color:var(--warn); } .exp.gone{ background:#fbeaea; color:var(--bad); }
  .bucket{ border-radius:10px; padding:11px 12px; margin-bottom:9px; }
  .bucket.now{ background:#eaf6ee; border:1px solid #bfe3cb; } .bucket.step{ background:#eef3fb; border:1px solid #cfe0f4; } .bucket.struct{ background:#f5f2ee; border:1px solid #e3dbc9; }
  .bucket .bh{ font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; margin-bottom:5px; }
  .pill{ display:inline-block; font-size:11.5px; background:#fff; border:1px solid var(--line); border-radius:999px; padding:3px 10px; margin:3px 5px 0 0; }
  .lane{ border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:8px; }
  .bar{ height:7px; background:#eef1f6; border-radius:4px; overflow:hidden; margin:5px 0; }
  .bar > i{ display:block; height:100%; background:var(--ok); }
  .gap{ font-size:11.5px; padding:3px 0; }
  .gap .k{ font-size:9px; font-weight:800; border-radius:4px; padding:1px 5px; margin-right:5px; }
  .gap .closeable{ background:#eef3fb; color:var(--blue); } .gap .structural{ background:#f5f2ee; color:var(--wall); }
  .expo{ border-left:3px solid var(--warn); background:#fdfaf4; border-radius:8px; padding:9px 12px; margin-bottom:8px; }
  .expo.high{ border-left-color:var(--bad); background:#fdf5f4; }
  .expo .f{ font-weight:700; font-size:13px; } .expo .d{ font-size:11.5px; color:var(--grey); margin-top:3px; }
  .disclaim{ font-size:11px; color:var(--grey); font-style:italic; margin-top:8px; }
  /* Field — WALLED OFF */
  .wallcard{ background:#faf8f4; border:1px dashed #d8cdbb; border-radius:13px; padding:15px; }
  .wallbanner{ font-size:11.5px; font-weight:700; color:var(--wall); background:#f3ecdf; border:1px solid #e3d6bf; border-radius:8px; padding:8px 11px; margin-bottom:10px; }
  .fres{ border-top:1px solid var(--line); padding:8px 0; font-size:12.5px; }
  .fres a{ color:var(--blue); font-size:11px; } .asof{ font-size:10px; color:var(--grey); }
  .empty{ text-align:center; color:var(--grey); font-size:13px; padding:22px; } .err{ color:var(--bad); font-size:12px; margin-top:6px; }
  .note{ font-size:10.5px; color:var(--grey); }
  .netpill{ position:fixed; top:10px; right:12px; font-size:11px; font-weight:700; border-radius:999px; padding:4px 11px; z-index:50; border:1px solid var(--line); background:#fff; color:var(--ok); }
  .netpill.off{ background:#fdf6e9; color:var(--warn); border-color:#e8d9b8; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📊 Know your business</h1>
  <div class="sub">What CB can tell you from data you&rsquo;ve already given &mdash; each fact with how much to trust it. Not a governance feature; the outward panel always says &ldquo;verify at the source.&rdquo;</div>
  <div id="app"><div class="card"><div class="empty">Loading…</div></div></div>
</div>
<div id="netpill" class="netpill"></div>
<script src="cb-offline.js"></script>
<script>
var API=(new URLSearchParams(location.search).get('api'))||'https://chitbridge-api-production.up.railway.app';
var TOK=null, TAB='yourself', _stage='email';
function paintPill(s){var p=el('netpill');if(!p)return;if(s.online){p.className='netpill';p.textContent=s.pending?('● Online · syncing '+s.pending):'● Online';}else{p.className='netpill off';p.textContent='⚠ Offline · '+(s.pending?s.pending+' pending':'work saved locally');}}
function saveKyb(){ if(window.CBOffline) CBOffline.saveDraft('kyb.cred',{title:(el('nc_title')||{}).value||''}); }
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function el(id){return document.getElementById(id);}
async function api(m,p,body){var h={'Content-Type':'application/json'};if(TOK)h.Authorization='Bearer '+TOK;var r=await fetch(API+p,{method:m,headers:h,body:body?JSON.stringify(body):undefined});var j=null;try{j=await r.json();}catch(e){}return{status:r.status,j:j};}
function rungChip(r){var c=r?('r-'+r):'r-null';return '<span class="rung '+c+'">'+esc(r||'not held')+'</span>';}

function loginView(msg){
  el('app').innerHTML='<div class="card"><label>Business email</label><input id="lg_email" placeholder="you@company.com">'
    +'<div id="otpwrap" style="display:none"><label>OTP <span class="note">(dev 123456)</span></label><input id="lg_otp" placeholder="6-digit code"></div>'
    +'<div class="row" style="margin-top:10px"><button class="pri" id="lg_btn" onclick="doLogin()">Send code</button></div>'
    +(msg?'<div class="err">'+esc(msg)+'</div>':'')+'</div>';
}
async function doLogin(){
  var email=((el('lg_email')||{}).value||'').trim();
  if(_stage==='email'){ if(!email.includes('@'))return; await api('POST','/api/entities/register',{email:email}); _stage='otp'; el('otpwrap').style.display=''; el('lg_btn').textContent='Open'; return; }
  var otp=((el('lg_otp')||{}).value||'').trim();
  var v=await api('POST','/api/entities/verify',{email:email,otp:otp});
  if(v.status===200&&v.j&&v.j.token){ TOK=v.j.token; shell(); load(); } else { loginView((v.j&&v.j.message)||'Login failed'); _stage='email'; }
}
function shell(){
  el('app').innerHTML='<div class="tabs">'
    +['yourself|Yourself','position|Position','risk|Risk','field|Field'].map(function(t){var k=t.split('|')[0],l=t.split('|')[1];return '<div class="tab'+(TAB===k?' on':'')+'" onclick="go(\''+k+'\')">'+l+'</div>';}).join('')
    +'</div><div id="body"><div class="card"><div class="empty">Loading…</div></div></div>';
}
function go(t){ TAB=t; shell(); load(); }
async function load(){
  var b=el('body'); b.innerHTML='<div class="card"><div class="empty">Computing from your data…</div></div>';
  if(TAB==='yourself') return renderYourself(b);
  if(TAB==='position') return renderPosition(b);
  if(TAB==='risk') return renderRisk(b);
  if(TAB==='field') return renderField(b);
}

// ── YOURSELF ──
async function renderYourself(b){
  var r=await api('GET','/api/kyb/yourself'); if(r.status===401){TOK=null;return loginView('Session expired');}
  var f=(r.j&&r.j.facts)||{}, cr=f.credentials||[], s=f.summary||{};
  var add='<div class="card"><div class="sec" style="margin-top:0">Add a credential CB doesn&rsquo;t know</div><div class="note" style="margin-bottom:6px">A village NOC, a municipal licence &mdash; anything. It lands <b>declared</b>; it rises to <b>documented</b> when you attach a real owned document. The list you add IS the roadmap.</div>'
    +'<div class="row"><input id="nc_title" placeholder="Credential name (e.g. Village Panchayat NOC)" style="flex:1;min-width:160px" value="'+esc(((window.CBOffline&&CBOffline.loadDraft('kyb.cred'))||{}).title||'')+'" oninput="saveKyb()"><button class="pri" onclick="addCred()">Add</button></div><div id="nc_err" class="err"></div></div>';
  var list = cr.length ? cr.map(function(c){
    var exp = c.expired?'<span class="exp gone">expired</span>':(c.expiring?'<span class="exp soon">expires in '+esc(String(c.days_left))+'d</span>':'');
    return '<div class="cred"><span class="nm">'+esc(c.title)+'</span>'+(c.valid_until?'<span class="asof">to '+esc(String(c.valid_until).slice(0,10))+'</span>':'')+exp+rungChip(c.rung)+'</div>';
  }).join('') : '<div class="empty">No credentials yet. Add one above, or gather them in Trade-ready.</div>';
  b.innerHTML='<div class="card"><div class="row" style="justify-content:space-between"><b style="font-size:14px">What you hold</b><span class="note">'+(s.held||0)+' held &middot; '+(s.verified||0)+' verified &middot; '+(s.documented||0)+' documented &middot; '+(s.declared||0)+' declared'+(s.expiring?' &middot; '+s.expiring+' expiring':'')+'</span></div>'+list+'</div>'+add
    +'<div class="note" style="padding:0 4px">'+esc((r.j&&r.j.note)||'')+'</div>';
}
async function addCred(){ var t=((el('nc_title')||{}).value||'').trim(); if(!t){el('nc_err').textContent='Enter a name';return;}
  if(!window.CBOffline){ var r=await api('POST','/api/kyb/credential',{title:t}); if(r.status===200){load();}else{el('nc_err').textContent=(r.j&&r.j.message)||'Failed';} return; }
  var res=await CBOffline.submit({method:'POST',path:'/api/kyb/credential',body:{title:t}}); CBOffline.clearDraft('kyb.cred');
  if(res.queued){ if(el('nc_title'))el('nc_title').value=''; el('nc_err').innerHTML='<span class="note">⏳ Offline — queued; it\'ll be added when you\'re back online.</span>'; }
  else if(res.ok){ load(); }
  else { el('nc_err').textContent='Failed ('+res.status+')'; }
}

// ── POSITION (directional selling avenues) ──
async function renderPosition(b){
  var r=await api('GET','/api/kyb/position?vertical=paint&origin=IN'); if(r.status===401){TOK=null;return loginView('Session expired');}
  var f=(r.j&&r.j.facts)||{}, reach=f.reach||{}, lanes=f.lanes||[];
  var buckets='<div class="bucket now"><div class="bh" style="color:var(--ok)">✓ Reachable now</div>'+((reach.reachable_now||[]).length?(reach.reachable_now||[]).map(function(x){return '<span class="pill">'+esc(x.dest)+'</span>';}).join(''):'<span class="note">none yet</span>')+'</div>'
    +'<div class="bucket step"><div class="bh" style="color:var(--blue)">→ One step away</div>'+((reach.one_step||[]).length?(reach.one_step||[]).map(function(x){return '<span class="pill">'+esc(x.dest)+' <span class="note">&mdash; needs '+esc(x.needs||'')+'</span></span>';}).join(''):'<span class="note">none</span>')+'</div>'
    +'<div class="bucket struct"><div class="bh" style="color:var(--wall)">■ Structural (not now)</div>'+((reach.structural||[]).length?(reach.structural||[]).map(function(x){return '<span class="pill">'+esc(x.dest)+' <span class="note">&mdash; '+esc((x.blocked_by||[]).join(', '))+'</span></span>';}).join(''):'<span class="note">none</span>')+'</div>';
  var laneHtml=lanes.map(function(l){
    var gaps=(l.gaps||[]).map(function(g){return '<div class="gap"><span class="k '+g.kind+'">'+esc(g.kind)+'</span>'+esc(g.title)+(g.kind==='closeable'?' <span class="note">('+esc(String(g.unlocks))+' market'+(g.unlocks>1?'s':'')+')</span>':'')+(g.kind==='structural'?' <span class="note">&mdash; '+esc(g.note||'')+'</span>':'')+'</div>';}).join('');
    return '<div class="lane"><div class="row" style="justify-content:space-between"><b>'+esc(l.dest_name)+'</b><span class="note">'+esc(String(l.readiness_pct))+'% &middot; '+l.met+'/'+l.total+' met</span></div><div class="bar"><i style="width:'+Math.max(2,l.readiness_pct)+'%"></i></div>'+(gaps||'<span class="note">nothing missing</span>')+'</div>';
  }).join('');
  b.innerHTML='<div class="card"><b style="font-size:14px">Where you can sell &mdash; directionally</b>'+buckets+'</div><div class="card"><div class="sec" style="margin-top:0">Per market</div>'+(laneHtml||'<div class="empty">No lanes.</div>')+'</div><div class="note" style="padding:0 4px">'+esc((r.j&&r.j.note)||'')+'</div>';
}

// ── RISK ──
async function renderRisk(b){
  var r=await api('GET','/api/kyb/risk'); if(r.status===401){TOK=null;return loginView('Session expired');}
  var f=(r.j&&r.j.facts)||{}, ex=f.exposures||[], conc=f.concentration||{};
  var exHtml=ex.length?ex.map(function(e){return '<div class="expo '+(e.severity==='high'?'high':'')+'"><div class="f">'+esc(e.fact)+'</div><div class="d">'+esc(e.detail||'')+'</div></div>';}).join(''):'<div class="empty">No exposures flagged from your current data. Good &mdash; or too little history yet.</div>';
  var parties=(conc.parties||[]).map(function(pp){return '<div class="cred"><span class="nm">'+esc(pp.counterparty)+'</span><span class="note">'+esc(String(pp.pct))+'%</span></div>';}).join('');
  b.innerHTML='<div class="card"><b style="font-size:14px">Where your exposure sits</b><div style="margin-top:8px">'+exHtml+'</div><div class="disclaim">'+esc((r.j&&r.j.note)||'')+'</div></div>'
    +(parties?'<div class="card"><div class="sec" style="margin-top:0">Business by counterparty ('+(conc.chits||0)+' records)</div>'+parties+'</div>':'');
}

// ── FIELD (walled off) ──
async function renderField(b){
  b.innerHTML='<div class="wallcard"><div class="wallbanner">⚠ Looks OUTWARD &mdash; unverified. Everything here is found on the web; verify at the source before you act. This never returns buyers to contact &mdash; only where demand is and whether you can reach it.</div>'
    +'<b style="font-size:14px">Where&rsquo;s the demand &mdash; and can you reach it?</b><div class="note" style="margin:5px 0 10px">One search, narrowed by your own profile (categories, credentials, appetite). Metered; the same profile the same day is free.</div>'
    +'<button class="pri" onclick="runField()">Run field search</button><div id="fld" style="margin-top:12px"></div></div>';
}
async function runField(){
  var host=el('fld'); host.innerHTML='<div class="note">Searching (narrowed by your profile)…</div>';
  var r=await api('POST','/api/kyb/field'); if(r.status===401){TOK=null;return loginView('Session expired');}
  var j=r.j||{};
  if(j.configured===false){ host.innerHTML='<div class="note" style="font-style:italic">'+esc(j.note||'Field search not connected yet.')+'</div>'; return; }
  var res=(j.results||[]);
  var html=res.length?res.map(function(x){return '<div class="fres"><b>'+esc(x.market)+'</b> '+rungChip('declared')+'<div class="note">'+esc(x.demand||'')+'</div>'+(x.source_url?'<a href="'+esc(x.source_url)+'" target="_blank" rel="noopener">source</a> <span class="asof">as of '+esc(String(x.as_of).slice(0,10))+'</span>':'')+'</div>';}).join(''):'<div class="empty">No demand signals returned.</div>';
  host.innerHTML=html+'<div class="note" style="margin-top:8px;font-style:italic">'+esc(j.note||'')+(j.cached?' &middot; (cached &mdash; free)':'')+'</div>';
}

if(window.CBOffline)CBOffline.configure({apiBase:API,token:function(){return TOK;},onChange:paintPill});
loginView();
</script>
</body>
</html>
