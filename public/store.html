<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Store</title>
<style>
  :root{ --ink:#1a2230; --muted:#5b6675; --line:#e6e9ee; --bg:#f6f7f9; --card:#fff; --accent:#2c5aa0; --accent-soft:#eaf1fb; --good:#2c7a43; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;line-height:1.5}
  header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);z-index:5}
  .bar{max-width:1000px;margin:0 auto;padding:14px 18px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .brand{font-size:19px;font-weight:800;display:flex;align-items:center;gap:8px}
  .brand .sub{font-size:11px;font-weight:600;color:var(--muted)}
  .search{flex:1;min-width:200px;display:flex}
  .search input{flex:1;padding:10px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;outline:none}
  .search input:focus{border-color:var(--accent)}
  .cats{max-width:1000px;margin:0 auto;padding:12px 18px 2px;display:flex;gap:8px;flex-wrap:wrap}
  .chip{padding:6px 14px;border:1px solid var(--line);border-radius:20px;background:#fff;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;user-select:none}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  main{max-width:1000px;margin:0 auto;padding:16px 18px 60px}
  .grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;display:flex;flex-direction:column;gap:8px}
  .card .cat{font-size:10.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);align-self:flex-start;padding:2px 9px;border-radius:20px}
  .card .nm{font-size:15px;font-weight:700;line-height:1.3}
  .card .pr{font-size:16px;font-weight:800;color:var(--ink);margin-top:auto}
  .card button{padding:9px 12px;border:0;border-radius:9px;background:var(--accent);color:#fff;font-weight:700;font-size:13px;cursor:pointer}
  .card button:active{transform:translateY(1px)}
  .msg{padding:60px 20px;text-align:center;color:var(--muted)}
  .msg .big{font-size:34px}
  .count{max-width:1000px;margin:0 auto;padding:4px 18px;font-size:12px;color:var(--muted)}
  footer{max-width:1000px;margin:0 auto;padding:20px 18px;color:var(--muted);font-size:11.5px;border-top:1px solid var(--line)}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1a2230;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;z-index:20}
  .toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand">🛍️ Store <span class="sub" id="netlabel"></span></div>
    <div class="search"><input id="q" type="search" placeholder="Search products…" autocomplete="off"></div>
  </div>
  <div class="cats" id="cats"></div>
</header>
<div class="count" id="count"></div>
<main><div id="body"><div class="msg"><div class="big">⏳</div>Loading the store…</div></div></main>
<footer id="foot"></footer>
<div class="toast" id="toast"></div>

<script>
  var API = 'https://chitbridge-api-production.up.railway.app';
  var NET = new URLSearchParams(location.search).get('net') || '';
  var STATE = { all: [], categories: [], q: '', cat: '' };

  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]; }); }
  function rs(v){ if (v == null) return ''; try { return '₹' + Number(v).toLocaleString('en-IN'); } catch(e){ return '₹' + v; } }
  function toast(m){ var t = document.getElementById('toast'); t.textContent = m; t.className = 'toast show'; setTimeout(function(){ t.className = 'toast'; }, 1800); }

  function order(name){ toast('“' + name + '” added — checkout is coming soon.'); }

  function visible(){
    return STATE.all.filter(function(p){
      if (STATE.cat && p.category !== STATE.cat) return false;
      if (STATE.q){ var s = (p.name + ' ' + p.category).toLowerCase(); if (s.indexOf(STATE.q.toLowerCase()) < 0) return false; }
      return true;
    });
  }
  function renderCats(){
    var el = document.getElementById('cats');
    var chips = ['<span class="chip ' + (STATE.cat === '' ? 'on' : '') + '" onclick="setCat(\'\')">All</span>'];
    STATE.categories.forEach(function(c){ chips.push('<span class="chip ' + (STATE.cat === c ? 'on' : '') + '" onclick="setCat(\'' + esc(c).replace(/'/g,"\\'") + '\')">' + esc(c) + '</span>'); });
    el.innerHTML = chips.join('');
  }
  function renderBody(){
    var items = visible();
    document.getElementById('count').textContent = items.length + ' product' + (items.length === 1 ? '' : 's');
    var body = document.getElementById('body');
    if (!items.length){ body.innerHTML = '<div class="msg"><div class="big">🔍</div>No products' + (STATE.q ? ' for “' + esc(STATE.q) + '”' : '') + '.</div>'; return; }
    body.innerHTML = '<div class="grid">' + items.map(function(p){
      return '<div class="card"><span class="cat">' + esc(p.category) + '</span>'
        + '<div class="nm">' + esc(p.name) + '</div>'
        + '<div class="pr">' + (p.price != null ? rs(p.price) : '') + '</div>'
        + '<button onclick="order(' + JSON.stringify(p.name).replace(/"/g,'&quot;') + ')">Order</button></div>';
    }).join('') + '</div>';
  }
  window.setCat = function(c){ STATE.cat = c; renderCats(); renderBody(); };

  document.getElementById('q').addEventListener('input', function(e){ STATE.q = e.target.value; renderBody(); });

  function load(){
    if (!NET){ document.getElementById('body').innerHTML = '<div class="msg"><div class="big">🛍️</div>No store specified. Open with <code>?net=&lt;network id&gt;</code>.</div>'; return; }
    document.getElementById('netlabel').textContent = NET;
    fetch(API + '/api/catalogue/network-store/' + encodeURIComponent(NET), { cache: 'no-store' })
      .then(function(r){ return r.json(); })
      .then(function(j){
        STATE.all = j.products || []; STATE.categories = j.categories || [];
        renderCats(); renderBody();
        document.getElementById('foot').innerHTML = 'One storefront across every line of business. You see products — never the network\'s internal departments, locations, or supply. Powered by Chit &amp; Bridge.';
      })
      .catch(function(){ document.getElementById('body').innerHTML = '<div class="msg"><div class="big">⚠️</div>Could not load the store. Try again.</div>'; });
  }
  load();
</script>
</body>
</html>
