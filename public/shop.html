<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop — Chit &amp; Bridge</title>
<style>
  :root{ --ink:#20303b; --grey:#8a949c; --line:#e7e3d8; --blue:#3F66A6; --gold-soft:#f7f2e3; --gold-line:#e6d9a8; --paper:#faf8f3; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; color:var(--ink); background:var(--paper); }
  .wrap{ max-width:860px; margin:0 auto; padding:20px 16px 60px; }
  .sg{ font-family:'Space Grotesk',-apple-system,sans-serif; }
  .hd{ display:flex; align-items:center; gap:12px; padding:14px 0 16px; border-bottom:1px solid var(--line); margin-bottom:18px; }
  .logo{ width:44px; height:44px; border-radius:12px; background:#eef3fb; display:flex; align-items:center; justify-content:center; font-size:22px; }
  .shopname{ font-weight:800; font-size:20px; }
  .badge{ font-size:11px; font-weight:700; border-radius:20px; padding:2px 9px; }
  .b-ver{ background:#e8f3ec; color:#2f7a45; } .b-open{ background:#e8f3ec; color:#2f7a45; } .b-closed{ background:#fbeae9; color:#b4453f; } .b-away{ background:#f7f2e3; color:#7a5e22; }
  .sechd{ font-size:11px; font-weight:800; color:#6a44a8; text-transform:uppercase; letter-spacing:.5px; margin:22px 0 10px; }
  .card{ border:1px solid var(--line); border-radius:14px; padding:15px 16px; margin-bottom:12px; background:#fff; }
  .fname{ font-weight:800; font-size:17px; }
  .meta{ font-size:12px; color:var(--grey); }
  .story{ font-size:13px; color:#3a4048; line-height:1.6; margin:6px 0 9px; }
  .chip{ display:inline-block; font-size:11px; border-radius:8px; padding:2px 9px; margin:0 5px 5px 0; }
  .c-tex{ background:#F0EAF9; color:#6a44a8; } .c-reg{ background:#eef3fb; color:#345488; } .c-eff{ background:#f3f0e8; color:#7a5e22; }
  .cclabel{ font-size:10px; color:var(--grey); text-transform:uppercase; letter-spacing:.4px; font-weight:700; margin:8px 0 3px; }
  .combo{ display:flex; align-items:center; gap:8px; margin-top:5px; }
  .dot{ display:inline-block; width:18px; height:18px; border-radius:50%; border:1px solid rgba(0,0,0,.15); }
  .cbname{ font-size:12.5px; font-weight:600; } .cbcols{ font-size:11px; color:var(--grey); }
  .apply{ font-size:11.5px; color:var(--grey); margin-top:8px; }
  .price{ font-size:17px; font-weight:800; margin-top:10px; }
  .price small{ font-size:12px; color:var(--grey); font-weight:400; }
  .prow{ display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px dashed var(--line); }
  .foot{ margin-top:26px; font-size:11px; color:var(--grey); text-align:center; line-height:1.6; }
  .msg{ padding:40px 16px; text-align:center; color:var(--grey); }
  .enq{ margin-top:12px; font-size:12px; color:var(--blue); }
</style>
</head>
<body>
<div class="wrap" id="app"><div class="msg">Loading shop…</div></div>
<script>
var API = (new URLSearchParams(location.search).get('api')) || 'https://chitbridge-api-production.up.railway.app';
var BRIDGE = (new URLSearchParams(location.search).get('bridge') || '').trim();
var _FIN=[]; var _ord=null; var _lg={}; var _SHOPDATA=null;
var _REGIONS=[]; var _REGION='IN';
var _CUR={INR:'₹',MXN:'Mex$',USD:'$',EUR:'€'};
var _FX={INR:1,MXN:0.20,USD:0.012,EUR:0.011};   // indicative FX (INR-base) — real FX is the ERP's job
var _FLAG={IN:'🇮🇳',MX:'🇲🇽',US:'🇺🇸',EU:'🇪🇺'};
function regionCur(){ return _REGIONS.find(function(r){return r.region_code===_REGION;})||{}; }
function priceSym(){ var rc=regionCur(); return _CUR[rc.currency]||rc.currency||'₹'; }
function priceUnit(){ var rc=regionCur(); return rc.units||'litre'; }
function priceVal(price){ var rc=regionCur(); return Math.round(price*(_FX[rc.currency]||1)); }
function finishPrice(price){ if(price==null) return '<small>price on request</small>'; return priceSym()+esc(String(priceVal(price)))+' <small>/ '+esc(priceUnit())+' · indicative</small>'; }
function setRegion(code){ _REGION=code; if(_SHOPDATA) render(_SHOPDATA); }
function regionBar(){
  if(!_REGIONS.length) return '';
  var rc=regionCur();
  var btns=_REGIONS.map(function(r){ var on=r.region_code===_REGION; return '<button onclick="setRegion(\''+r.region_code+'\')" style="border:'+(on?'2px solid #3F66A6':'1px solid #e7e3d8')+';background:'+(on?'#eef4fc':'#fff')+';border-radius:9px;padding:5px 11px;margin:0 6px 6px 0;cursor:pointer;font-size:13px;font-weight:600">'+((_FLAG[r.region_code]||'🌐')+' '+esc(r.region_code))+'</button>'; }).join('');
  return '<div style="margin:0 0 16px;padding:11px 13px;background:#f4f6f8;border:1px solid var(--line);border-radius:12px">'
    +'<div style="font-size:11px;color:var(--grey);margin-bottom:7px">🌐 Spin the globe — see this catalogue for a customer in:</div>'
    +'<div style="display:flex;flex-wrap:wrap;align-items:center">'+btns+'</div>'
    +'<div style="font-size:12px;color:#3a4048;margin-top:6px">Showing for <b>'+(_FLAG[_REGION]||'')+' '+esc(_REGION)+'</b> · currency <b>'+esc(rc.currency||'')+'</b> ('+esc(priceSym())+') · unit <b>'+esc(rc.units||'')+'</b> · language <b>'+esc(rc.language||'')+'</b>'+((rc.jurisdiction&&rc.jurisdiction.compliance)?(' · <span style="color:#b4453f">'+esc(rc.jurisdiction.compliance)+'</span>'):'')+'</div>'
    +'</div>';
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function el(id){ return document.getElementById(id); }
function swatch(c){ return '<span class="dot" title="'+esc((c.name||'')+' '+(c.hex||''))+'" style="background:'+esc(c.hex||'#ccc')+'"></span>'; }
function comboHtml(cm){ return '<div class="combo"><span style="display:inline-flex;gap:3px">'+((cm.colours||[]).map(swatch).join(''))+'</span><span class="cbname">'+esc(cm.name||'')+'</span><span class="cbcols">'+((cm.colours||[]).map(function(c){return esc(c.name);}).join(' + '))+'</span></div>'; }
function finishCard(it, cur, idx, vizEnabled){
  var price=(it.commercials&&it.commercials.price_per_litre!=null)?it.commercials.price_per_litre:null;
  var chips='<span class="chip c-tex">'+esc(it.texture_family||'')+'</span>'+(it.region?'<span class="chip c-reg">'+esc(it.region)+'</span>':'')+((it.effect||[]).map(function(e){return '<span class="chip c-eff">'+esc(e)+'</span>';}).join(''));
  return '<div class="card">'
    +'<div style="display:flex;align-items:baseline;gap:8px"><span class="fname sg">'+esc(it.name)+'</span><span class="meta">'+esc(it.scale||'')+(it.sheen?(' · '+esc(it.sheen)):'')+'</span></div>'
    +'<div class="story">'+esc(it.inspiration||'')+'</div>'
    +'<div>'+chips+'</div>'
    +'<div class="cclabel">Colour combinations</div>'+((it.combinations||[]).map(comboHtml).join(''))
    +'<div class="apply">Applied with '+((it.tools||[]).join(', '))+' · '+esc(it.coats||'')+'</div>'
    +'<div class="price">'+finishPrice(price)+'</div>'
    +'<div style="margin-top:10px">'
    +(vizEnabled&&idx!=null?'<button onclick="vizOpen('+idx+')" style="margin:0 8px 0 0;border:1px solid #6a44a8;background:#F0EAF9;color:#6a44a8;border-radius:9px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer">✨ See it on your wall</button>':'')
    +(price!=null&&idx!=null?'<button onclick="orderOpen('+idx+')" style="border:0;border-radius:9px;padding:9px 18px;background:#3F66A6;color:#fff;font-weight:700;font-size:13px;cursor:pointer">Order this →</button>':'')
    +'</div></div>';
}
function productRow(p, cur){ var d=(p.item_data||p)||{}; return '<div class="prow"><div style="flex:1"><b>'+esc(d.name||d.product||'item')+'</b> <span class="meta">'+esc(d.unit||'')+'</span></div><div style="font-weight:700">'+(d.price!=null?(priceSym()+esc(String(priceVal(d.price)))):'—')+'</div></div>'; }
function render(data){
  var s=data.shop||{}, cur=(s.currency_code==='INR'||!s.currency_code)?'₹':(s.currency_code+' ');
  var statusBadge = s.business_status==='closed' ? '<span class="badge b-closed">Closed</span>' : (s.business_status==='away'?'<span class="badge b-away">Away</span>':'<span class="badge b-open">Open</span>');
  var head='<div class="hd"><div class="logo">🎨</div><div style="flex:1"><div class="shopname sg">'+esc(s.display_name||'Shop')+'</div><div class="meta">'+esc(s.bridge_id||'')+(s.address?(' · '+esc(s.address)):'')+'</div></div>'+(s.is_verified?'<span class="badge b-ver">✓ Verified</span>':'')+' '+statusBadge+'</div>';
  var finishes=(data.finishes||[]);
  var finHtml=''; _FIN=[];
  finishes.forEach(function(f){
    var viz=(f.experience&&f.experience.visualize)||{};   // b78 — the source's experience CASCADES to this storefront
    var vizBadge=viz.enabled?'<div style="margin:0 0 9px;font-size:11.5px;color:#6a44a8;background:#F0EAF9;border:1px solid #e3d5f5;border-radius:8px;padding:6px 10px;display:inline-block">✨ '+esc(viz.label||'Scan your home')+' — see it on your wall <span style="color:#9aa3a7">· from '+esc(f.title||'the brand')+'</span></div>':'';
    finHtml += '<div class="sechd">🎨 '+esc(f.title||f.collection||'Designer finishes')+'</div>' + vizBadge + (f.items||[]).map(function(it){ var idx=_FIN.length; _FIN.push({source:f.source,it:it,rules:(f.experience&&f.experience.rules)||{}}); return finishCard(it,cur,idx,viz.enabled); }).join('');
  });
  var prods=(data.items||[]);
  var prodHtml = prods.length ? ('<div class="sechd" style="color:var(--grey)">🗂️ Products</div>'+prods.map(function(p){return productRow(p,cur);}).join('')) : '';
  var enq = '<div class="enq">Pick a finish, choose a colour combination and quantity, and order with just your phone or email.</div>';
  el('app').innerHTML = head + regionBar() + finHtml + prodHtml + (finHtml||prodHtml?enq:'<div class="msg">This shop has nothing on display yet.</div>')
    + '<div class="foot">Powered by <b>Chit &amp; Bridge</b> · a governed rail. Design &amp; colour shown are referenced from the brand catalogue; prices are set by the shop.</div>';
}
// ── Login-first gate (storefront_access==='login'): customer signs in (phone/email + OTP) before browsing. ──
function renderLoginGate(shop){
  var otpStep=(_lg.step==='otp'), fld='style="width:100%;padding:9px;border:1px solid #e7e3d8;border-radius:8px;margin-bottom:10px;font-size:14px"';
  el('app').innerHTML='<div class="hd"><div class="logo">🎨</div><div style="flex:1"><div class="shopname sg">'+esc(shop.display_name||'Shop')+'</div><div class="meta">'+esc(shop.bridge_id||'')+'</div></div></div>'
    +'<div class="card" style="max-width:420px;margin:26px auto"><div class="sg" style="font-weight:800;font-size:16px;margin-bottom:4px">Sign in to view this shop</div>'
    +'<div class="meta" style="margin-bottom:12px">This shop asks customers to sign in first. Enter your phone or email — we\'ll text/email a one-time code.</div>'
    +'<input id="lg_contact" placeholder="9876543210 or you@email.com" '+(otpStep?'disabled':'')+' value="'+esc(_lg.contact||'')+'" '+fld+'>'
    +(otpStep?'<input id="lg_otp" inputmode="numeric" maxlength="6" placeholder="6-digit code" value="'+esc(_lg.otp||_lg.dev_otp||'')+'" '+fld+'>':'')
    +(_lg.err?'<div style="color:#b4453f;font-size:12.5px;margin-bottom:8px">'+esc(_lg.err)+'</div>':'')
    +(_lg.msg?'<div style="color:#2e7a45;font-size:12.5px;margin-bottom:8px">'+esc(_lg.msg)+'</div>':'')
    +(_lg.busy?'<button disabled style="width:100%;border:0;border-radius:10px;padding:12px;background:#9db4d6;color:#fff;font-weight:700;font-size:14px">⏳ Processing…</button>'
      :'<button onclick="'+(otpStep?'sfLoginVerify':'sfLoginStart')+'()" style="width:100%;border:0;border-radius:10px;padding:12px;background:#3F66A6;color:#fff;font-weight:700;font-size:14px;cursor:pointer">'+(otpStep?'View shop':'Send code')+'</button>')
    +'</div>';
}
function sfLoginStart(){
  if(_lg.busy)return; _lg.contact=(el('lg_contact').value||'').trim(); _lg.err=null; if(!_lg.contact){ _lg.err='Enter a phone or email.'; renderLoginGate(_SHOPDATA.shop); return; }
  _lg.busy=true; renderLoginGate(_SHOPDATA.shop);
  fetch(API+'/api/catalogue/'+encodeURIComponent(BRIDGE)+'/order/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({identifier:_lg.contact})})
    .then(function(r){return r.json().then(function(j){return{status:r.status,j:j};});})
    .then(function(res){ _lg.busy=false; if(res.status!==200){ _lg.err=(res.j&&res.j.message)||'Could not send code.'; renderLoginGate(_SHOPDATA.shop); return; } _lg.step='otp'; _lg.dev_otp=res.j&&res.j.dev_otp; _lg.msg='Code sent.'; _lg.err=null; renderLoginGate(_SHOPDATA.shop); })
    .catch(function(e){ _lg.busy=false; _lg.err=e.message; renderLoginGate(_SHOPDATA.shop); });
}
function sfLoginVerify(){
  if(_lg.busy)return; _lg.otp=(el('lg_otp').value||'').trim(); if(_lg.otp.length!==6){ _lg.err='Enter the 6-digit code.'; renderLoginGate(_SHOPDATA.shop); return; }
  _lg.busy=true; _lg.err=null; renderLoginGate(_SHOPDATA.shop);
  fetch(API+'/api/catalogue/'+encodeURIComponent(BRIDGE)+'/login/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({identifier:_lg.contact,otp:_lg.otp})})
    .then(function(r){return r.json().then(function(j){return{status:r.status,j:j};});})
    .then(function(res){ if(res.status!==200){ _lg.busy=false; _lg.err=(res.j&&res.j.message)||'Verification failed.'; renderLoginGate(_SHOPDATA.shop); return; } render(_SHOPDATA); })
    .catch(function(e){ _lg.busy=false; _lg.err=e.message; renderLoginGate(_SHOPDATA.shop); });
}
// ── Order flow: pick combination + qty → phone/email → OTP → place order (a chit to the shop). Price is server-side. ──
function ohost(){ var h=el('ohost'); if(!h){ h=document.createElement('div'); h.id='ohost'; document.body.appendChild(h); } return h; }
function orderClose(){ var h=el('ohost'); if(h) h.innerHTML=''; _ord=null; }
function orderOpen(idx){ if(!_FIN[idx])return; _ord={idx:idx, step:'contact'}; orderRender(); }
function orderRender(msg, err){
  var e=_FIN[_ord.idx], it=e.it, cur='₹';
  var comboOpts=(it.combinations||[]).map(function(cm){ return '<option value="'+esc(cm.name)+'"'+(cm.name===_ord.combo?' selected':'')+'>'+esc(cm.name)+' ('+((cm.colours||[]).map(function(c){return esc(c.name);}).join(' + '))+')</option>'; }).join('');
  var minL=(e.rules&&Number(e.rules.min_order_litres))||0;   // STONE 2: the source's rule, cascaded
  var otpStep=(_ord.step==='otp');
  var fld='style="width:100%;padding:9px;border:1px solid #e7e3d8;border-radius:8px;margin:3px 0 11px;font-size:14px"';
  var h='<div style="position:fixed;inset:0;background:rgba(15,22,32,.5);z-index:900;display:flex;align-items:center;justify-content:center;padding:12px" onclick="if(event.target===this)orderClose()">'
    +'<div style="background:#fff;width:100%;max-width:440px;border-radius:16px;padding:18px 18px 22px;max-height:92vh;overflow:auto">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:2px"><b class="sg" style="font-size:17px;flex:1">Order · '+esc(it.name)+'</b><button onclick="orderClose()" style="border:0;background:none;font-size:22px;cursor:pointer;color:#8a949c">×</button></div>'
    +'<div class="meta" style="margin-bottom:12px">'+esc(it.texture_family||'')+' · '+cur+esc(String((it.commercials&&it.commercials.price_per_litre)||''))+' / litre</div>'
    +'<label style="font-size:12px;color:#6a707a">Colour combination</label><select id="o_combo" '+fld+'>'+comboOpts+'</select>'
    +'<label style="font-size:12px;color:#6a707a">Quantity (litres)'+(minL?' <span style="color:#9aa3a7">· min '+minL+' L (set by the brand)</span>':'')+'</label><input id="o_qty" inputmode="decimal" value="'+esc(_ord.qty||String(minL||1))+'" '+fld+'>'
    +'<label style="font-size:12px;color:#6a707a">Your name</label><input id="o_name" placeholder="optional" value="'+esc(_ord.name||'')+'" '+fld+'>'
    +'<label style="font-size:12px;color:#6a707a">Your area — pincode or city <span style="color:#9aa3a7">· optional</span></label><input id="o_loc" placeholder="e.g. 560001 or Bengaluru" value="'+esc(_ord.loc||'')+'" '+fld+'>'
    +'<label style="font-size:12px;color:#6a707a">Phone or email</label><input id="o_contact" placeholder="9876543210 or you@email.com" '+(otpStep?'disabled':'')+' value="'+esc(_ord.contact||'')+'" '+fld+'>'
    +(otpStep?('<label style="font-size:12px;color:#6a707a">6-digit code sent to you</label><input id="o_otp" inputmode="numeric" maxlength="6" value="'+esc(_ord.otp||_ord.dev_otp||'')+'" '+fld+'>'):'')
    +(err?'<div style="color:#b4453f;font-size:12.5px;margin-bottom:8px">'+esc(err)+'</div>':'')
    +(msg?'<div style="color:#2e7a45;font-size:12.5px;margin-bottom:8px">'+esc(msg)+'</div>':'')
    +(_ord.busy?'<button disabled style="width:100%;border:0;border-radius:10px;padding:12px;background:#9db4d6;color:#fff;font-weight:700;font-size:14px">⏳ Processing…</button>'
      :(otpStep
        ?'<button onclick="orderConfirm()" style="width:100%;border:0;border-radius:10px;padding:12px;background:#3F66A6;color:#fff;font-weight:700;font-size:14px;cursor:pointer">Place order</button>'
        :'<button onclick="orderStart()" style="width:100%;border:0;border-radius:10px;padding:12px;background:#3F66A6;color:#fff;font-weight:700;font-size:14px;cursor:pointer">Send code</button>'))
    +'</div></div>';
  ohost().innerHTML=h;
}
function _ocap(){ if(el('o_combo'))_ord.combo=el('o_combo').value; if(el('o_qty'))_ord.qty=el('o_qty').value; if(el('o_name'))_ord.name=(el('o_name').value||'').trim(); if(el('o_loc'))_ord.loc=(el('o_loc').value||'').trim(); if(el('o_contact'))_ord.contact=(el('o_contact').value||'').trim(); if(el('o_otp'))_ord.otp=el('o_otp').value; }
function orderStart(){
  if(_ord.busy)return; _ocap(); if(!_ord.contact){ orderRender(null,'Enter a phone or email.'); return; }
  _ord.busy=true; orderRender();
  fetch(API+'/api/catalogue/'+encodeURIComponent(BRIDGE)+'/order/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({identifier:_ord.contact,name:_ord.name})})
    .then(function(r){return r.json().then(function(j){return{status:r.status,j:j};});})
    .then(function(res){ _ord.busy=false; if(res.status!==200){ orderRender(null,(res.j&&res.j.message)||'Could not send code.'); return; } _ord.step='otp'; _ord.dev_otp=res.j&&res.j.dev_otp; orderRender('Code sent — check your '+((res.j&&res.j.channel)||'phone/email')+'.'); })
    .catch(function(e){ _ord.busy=false; orderRender(null,e.message); });
}
function orderConfirm(){
  if(_ord.busy)return; _ocap(); var otp=(_ord.otp||'').trim(); if(otp.length!==6){ orderRender(null,'Enter the 6-digit code.'); return; }
  var e=_FIN[_ord.idx], it=e.it, qty=Number(_ord.qty);
  var body={ identifier:_ord.contact, name:_ord.name, otp:otp, location:_ord.loc||'', line_items:[{kind:'finish', source:e.source, finish:it.name, combination:_ord.combo, quantity:qty}] };
  _ord.busy=true; orderRender();
  fetch(API+'/api/catalogue/'+encodeURIComponent(BRIDGE)+'/order/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json().then(function(j){return{status:r.status,j:j};});})
    .then(function(res){ if(res.status!==200){ _ord.busy=false; orderRender(null,(res.j&&res.j.message)||'Order failed.'); return; }
      ohost().innerHTML='<div style="position:fixed;inset:0;background:rgba(15,22,32,.5);z-index:900;display:flex;align-items:center;justify-content:center;padding:12px" onclick="orderClose()"><div style="background:#fff;max-width:400px;border-radius:16px;padding:26px;text-align:center"><div style="font-size:40px">✓</div><div class="sg" style="font-weight:800;font-size:18px;margin-top:8px">Order placed</div><div style="font-size:13px;color:#3a4048;margin-top:8px;line-height:1.6">Your order for <b>'+esc(it.name)+((_ord.combo)?(' · '+esc(_ord.combo)):'')+'</b> ('+esc(String(qty))+' L) reached the shop. They\'ll be in touch.</div><button onclick="orderClose()" style="margin-top:16px;border:0;border-radius:10px;padding:10px 20px;background:#3F66A6;color:#fff;font-weight:700;cursor:pointer">Done</button></div></div>'; })
    .catch(function(e){ _ord.busy=false; orderRender(null,e.message); });
}
// ── VISUALIZE-APPLY ("scan your home") — CHEAP first slice: upload a room photo, tint it in each recommended
// combination (client-side canvas, no upload/GPU/S3), swap freely, then order. Honest: indicative overlay, not a true
// room render yet (that swaps in later, cost-capped, cache-to-S3). Gated by the SOURCE's experience.visualize.enabled.
var _VIZ=null;
function vizhost(){ var h=el('vizhost'); if(!h){ h=document.createElement('div'); h.id='vizhost'; document.body.appendChild(h); } return h; }
function vizClose(){ var h=el('vizhost'); if(h)h.innerHTML=''; _VIZ=null; }
function vizOpen(idx){ var e=_FIN[idx]; if(!e)return; var combos=(e.it.combinations||[]); _VIZ={idx:idx, img:null, combos:combos, combo:combos[0]||null}; vizRender(); }
function vizRender(){
  var e=_FIN[_VIZ.idx], it=e.it, combos=_VIZ.combos;
  var chips=combos.map(function(cm,i){ var on=_VIZ.combo&&_VIZ.combo.name===cm.name; var sw=(cm.colours||[]).map(function(c){return '<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:'+esc(c.hex)+';border:1px solid rgba(0,0,0,.15);vertical-align:middle"></span>';}).join(''); return '<button onclick="vizPick('+i+')" style="border:'+(on?'2px solid #6a44a8':'1px solid #e7e3d8')+';background:#fff;border-radius:9px;padding:6px 10px;margin:0 6px 6px 0;cursor:pointer;font-size:12px"><span style="display:inline-flex;gap:2px;margin-right:5px">'+sw+'</span>'+esc(cm.name)+'</button>'; }).join('');
  var upload='<label style="display:block;border:2px dashed #cfc3e8;border-radius:12px;padding:26px;text-align:center;cursor:pointer;color:#6a44a8;font-weight:600">📷 Upload a photo of your room<input type="file" accept="image/*" onchange="vizLoad(event)" style="display:none"></label>';
  vizhost().innerHTML='<div style="position:fixed;inset:0;background:rgba(15,22,32,.6);z-index:950;display:flex;align-items:center;justify-content:center;padding:12px" onclick="if(event.target===this)vizClose()">'
    +'<div style="background:#fff;width:100%;max-width:560px;border-radius:16px;padding:16px 16px 20px;max-height:94vh;overflow:auto">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:2px"><b class="sg" style="font-size:17px;flex:1">'+esc(it.name)+' on your wall</b><button onclick="vizClose()" style="border:0;background:none;font-size:22px;cursor:pointer;color:#8a949c">×</button></div>'
    +'<div style="font-size:11.5px;color:#9aa3a7;margin-bottom:10px">Upload a photo of your room and try the colour combinations. Indicative preview (colour overlay) - a true room render is coming.</div>'
    +(_VIZ.img?'<canvas id="viz_canvas" width="520" height="340" style="width:100%;border-radius:12px;background:#eef0f2;display:block"></canvas><div style="margin-top:10px">'+chips+'</div><div style="display:flex;gap:8px;margin-top:8px"><button onclick="vizToOrder()" style="flex:1;border:0;border-radius:10px;padding:12px;background:#3F66A6;color:#fff;font-weight:700;font-size:14px;cursor:pointer">Order this combination →</button><label style="border:1px solid #e7e3d8;border-radius:10px;padding:12px;cursor:pointer;font-size:13px">Change photo<input type="file" accept="image/*" onchange="vizLoad(event)" style="display:none"></label></div>':upload)
    +'</div></div>';
  if(_VIZ.img) vizDraw(_VIZ.combo);
}
function vizLoad(ev){ var f=ev.target.files&&ev.target.files[0]; if(!f)return; var rd=new FileReader(); rd.onload=function(){ var im=new Image(); im.onload=function(){ _VIZ.img=im; vizRender(); }; im.src=rd.result; }; rd.readAsDataURL(f); }
function vizPick(i){ _VIZ.combo=_VIZ.combos[i]; vizRender(); }
function vizDraw(combo){ var cv=el('viz_canvas'); if(!cv||!_VIZ.img)return; var ctx=cv.getContext('2d'); var iw=_VIZ.img.width,ih=_VIZ.img.height,cw=cv.width,ch=cv.height; var sc=Math.min(cw/iw,ch/ih); var w=iw*sc,h=ih*sc,x=(cw-w)/2,y=(ch-h)/2; ctx.clearRect(0,0,cw,ch); ctx.fillStyle='#eef0f2'; ctx.fillRect(0,0,cw,ch); ctx.drawImage(_VIZ.img,x,y,w,h);
  if(combo&&combo.colours&&combo.colours.length){ ctx.save(); ctx.globalCompositeOperation='multiply'; ctx.globalAlpha=0.5; var cols=combo.colours; var g=ctx.createLinearGradient(x,0,x+w,0); cols.forEach(function(c,i){ g.addColorStop(cols.length>1?(i/(cols.length-1)):0, c.hex||'#ccc'); }); ctx.fillStyle=g; ctx.fillRect(x,y,w,h); ctx.restore(); }
}
function vizToOrder(){ var idx=_VIZ.idx, comboName=_VIZ.combo&&_VIZ.combo.name; vizClose(); _ord={idx:idx, step:'contact', combo:comboName}; orderRender(); }
(function(){
  if(!BRIDGE){ el('app').innerHTML='<div class="msg">No shop specified. Use a link like <b>shop.html?bridge=CBXXXXXXXX</b></div>'; return; }
  // load the region layers first (for the spin-the-globe switcher), then the shop
  fetch(API+'/api/assist/regions').then(function(r){return r.json();}).then(function(j){ _REGIONS=(j&&j.regions)||[]; if(_REGIONS.length && !_REGIONS.find(function(x){return x.region_code===_REGION;})) _REGION=_REGIONS[0].region_code; }).catch(function(){}).then(function(){
    fetch(API+'/api/catalogue/'+encodeURIComponent(BRIDGE)).then(function(r){ return r.json().then(function(j){ return {status:r.status, j:j}; }); })
      .then(function(res){ if(res.status!==200){ el('app').innerHTML='<div class="msg">'+esc((res.j&&res.j.message)||'Shop not found or has no public catalogue.')+'</div>'; return; } _SHOPDATA=res.j; if(res.j.shop&&res.j.shop.storefront_access==='login'){ renderLoginGate(res.j.shop); } else { render(res.j); } })
      .catch(function(e){ el('app').innerHTML='<div class="msg">Could not reach the shop. '+esc(e.message||'')+'</div>'; });
  });
})();
</script>
