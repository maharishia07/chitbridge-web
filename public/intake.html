<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chit &amp; Bridge — Intake inbox</title>
<style>
  :root{ --ink:#1b2431; --grey:#6a7686; --line:#e5e8ee; --bg:#f5f6f9; --card:#fff; --blue:#3F66A6; --ok:#2f7a45; --purple:#6d5bd0; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); }
  .wrap{ max-width:760px; margin:0 auto; padding:16px; }
  h1{ font-size:19px; margin:6px 0 2px; }
  .sub{ font-size:12.5px; color:var(--grey); margin-bottom:14px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:13px; padding:14px 15px; margin-bottom:12px; }
  label{ font-size:11px; font-weight:700; color:var(--grey); display:block; margin:8px 0 3px; }
  input,textarea,select{ width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px; font-size:13px; font-family:inherit; }
  textarea{ min-height:70px; resize:vertical; }
  button{ font-size:13px; font-weight:700; border:0; border-radius:9px; padding:9px 15px; cursor:pointer; }
  .pri{ background:var(--blue); color:#fff; } .pur{ background:var(--purple); color:#fff; } .gh{ background:#fff; color:var(--ink); border:1px solid var(--line); }
  .row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .cap{ border:1px solid var(--line); border-radius:11px; padding:12px 13px; margin-bottom:10px; background:#fff; }
  .chn{ font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--blue); background:#eef3fb; border-radius:5px; padding:2px 7px; }
  .from{ font-size:11.5px; color:var(--grey); }
  .msg{ font-size:13px; margin:7px 0; white-space:pre-wrap; }
  .draft{ background:#f7f6fd; border:1px solid #e4dff6; border-radius:9px; padding:10px 12px; margin-top:8px; font-size:12.5px; }
  .li{ display:flex; justify-content:space-between; padding:3px 0; border-top:1px dashed var(--line); font-size:12px; }
  .note{ font-size:10.5px; color:var(--grey); }
  .empty{ text-align:center; color:var(--grey); font-size:13px; padding:26px; }
  .err{ color:#c0453b; font-size:12px; margin-top:6px; }
  .ok{ color:var(--ok); }
  .badge{ font-size:9.5px; font-weight:800; color:var(--ok); }
</style>
</head>
<body>
<div class="wrap">
  <h1>📥 Intake inbox</h1>
  <div class="sub">Bring an inbound message (WhatsApp · email · web) onto the rail: capture → AI structures it → you confirm → it becomes a chit. This is a test surface for the capture connector.</div>
  <div id="app"><div class="card"><div class="empty">Loading…</div></div></div>
</div>
<script>
var API = (new URLSearchParams(location.search).get('api')) || 'https://chitbridge-api-production.up.railway.app';
var TOK = null, ME = null;
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function el(id){ return document.getElementById(id); }
async function api(m,p,body){ var h={'Content-Type':'application/json'}; if(TOK)h.Authorization='Bearer '+TOK; var r=await fetch(API+p,{method:m,headers:h,body:body?JSON.stringify(body):undefined}); var j=null; try{j=await r.json();}catch(e){} return {status:r.status,j:j}; }

// ── login (email → OTP) ──
function loginView(msg){
  el('app').innerHTML='<div class="card"><label>Business email</label><input id="lg_email" placeholder="you@company.com">'
    +'<div id="otpwrap" style="display:none"><label>OTP <span class="note">(dev OTP = 123456)</span></label><input id="lg_otp" placeholder="6-digit code"></div>'
    +'<div class="row" style="margin-top:10px"><button class="pri" id="lg_btn" onclick="doLogin()">Send code</button></div>'
    +(msg?'<div class="err">'+esc(msg)+'</div>':'')+'</div>';
}
var _stage='email';
async function doLogin(){
  var email=(el('lg_email')||{}).value; email=(email||'').trim();
  if(_stage==='email'){
    if(!email.includes('@')){ el('app').querySelector('.err')&&0; return; }
    await api('POST','/api/entities/register',{email:email});
    _stage='otp'; el('otpwrap').style.display=''; el('lg_btn').textContent='Verify & open inbox';
    return;
  }
  var otp=((el('lg_otp')||{}).value||'').trim();
  var v=await api('POST','/api/entities/verify',{email:email,otp:otp});
  if(v.status===200 && v.j && v.j.token){ TOK=v.j.token; ME=v.j.entity||{}; load(); }
  else { loginView((v.j&&v.j.message)||'Login failed'); _stage='email'; }
}

// ── inbox ──
async function load(){
  var r=await api('GET','/api/capture/pending');
  if(r.status===401){ TOK=null; return loginView('Session expired'); }
  var caps=(r.j&&r.j.captures)||[];
  var mig=(r.j&&r.j.note)?'<div class="note" style="margin-bottom:8px">⚠ '+esc(r.j.note)+' — run migration b104 to enable.</div>':'';
  var sim='<div class="card"><b style="font-size:13px">Simulate an inbound message</b> <span class="note">(stands in for a WhatsApp/email arriving)</span>'
    +'<div class="row" style="margin-top:6px"><select id="s_ch" style="width:130px"><option>whatsapp</option><option>email</option><option>web</option><option>sms</option></select>'
    +'<input id="s_from" placeholder="from (phone / email)" style="flex:1;min-width:140px"></div>'
    +'<label>Message</label><textarea id="s_text" placeholder="e.g. Hi, need 40 drums of white primer and 12 tins of hardener, deliver to Chennai next week"></textarea>'
    +'<div class="row" style="margin-top:8px"><button class="pri" onclick="simulate()">Add to inbox</button><span id="s_err" class="err"></span></div></div>';
  var list = caps.length ? caps.map(capCard).join('') : '<div class="card"><div class="empty">No pending captures. Simulate one above.</div></div>';
  el('app').innerHTML=mig+sim+'<div id="caps">'+list+'</div>';
}
function capCard(c){
  var draft = c.structured ? draftHtml(c.structured) : '';
  return '<div class="cap" id="cap_'+c.id+'"><div class="row"><span class="chn">'+esc(c.channel)+'</span><span class="from">from '+esc(c.sender_ref||c.sender_name||'unknown')+'</span></div>'
    +'<div class="msg">'+esc(c.raw_text)+'</div>'
    +'<div class="row"><button class="pur" onclick="structure(\''+c.id+'\')">✨ Structure with AI</button>'
    +'<button class="gh" onclick="dismiss(\''+c.id+'\')">Dismiss</button></div>'
    +'<div id="draft_'+c.id+'">'+draft+'</div></div>';
}
function draftHtml(s){
  var items=(s.line_items||[]).map(function(it){ return '<div class="li"><span>'+esc(it.particulars)+' <span class="note">'+esc(it.unit||'')+'</span></span><span>'+esc(String(it.qty||0))+' × '+esc(String(it.rate||0))+'</span></div>'; }).join('');
  return '<div class="draft"><div class="note">🤖 AI proposal — review before you create the chit</div>'
    +'<div style="font-weight:700;margin:4px 0">'+esc(s.subject||'Intake')+' <span class="note">('+esc(s.intent||'other')+')</span></div>'
    +(items||'<div class="note">No line items detected.</div>')
    +(s.notes?'<div class="note" style="margin-top:5px">'+esc(s.notes)+'</div>':'')
    +'<div class="row" style="margin-top:9px"><button class="pri" onclick="createChit(this)" data-s=\''+esc(encodeURIComponent(JSON.stringify(s)))+'\'>✓ Create chit on the rail</button><span class="err cerr"></span></div></div>';
}
async function simulate(){
  var ch=(el('s_ch')||{}).value, from=(el('s_from')||{}).value, text=(el('s_text')||{}).value;
  if(!(text||'').trim()){ el('s_err').textContent='Enter a message'; return; }
  var r=await api('POST','/api/capture/simulate',{channel:ch,sender_ref:from,raw_text:text});
  if(r.status===200||r.status===201){ el('s_text').value=''; load(); } else { el('s_err').textContent=(r.j&&r.j.message)||'Failed'; }
}
async function structure(id){
  var host=el('draft_'+id); if(host)host.innerHTML='<div class="note">✨ Structuring…</div>';
  var r=await api('POST','/api/capture/'+id+'/structure');
  if(r.status===200 && r.j && r.j.structured){ if(host)host.innerHTML=draftHtml(r.j.structured); }
  else { if(host)host.innerHTML='<div class="err">'+esc((r.j&&r.j.message)||'AI structure failed (is AI connected?)')+'</div>'; }
}
async function createChit(btn){
  var capEl=btn.closest('.cap'); var id=capEl.id.replace('cap_','');
  var s=JSON.parse(decodeURIComponent(btn.getAttribute('data-s')));
  var line_items=(s.line_items||[]).map(function(it){ var q=+it.qty||0,p=+it.rate||0; return {particulars:it.particulars||'item',quantity:q,price:p,total:q*p}; });
  var subj=(s.subject||'Intake')+' (from capture)';
  btn.disabled=true; btn.textContent='Creating…';
  // human-confirm = THIS click → the proven /api/chits/send path (to self, as an intake record on the rail)
  var send=await api('POST','/api/chits/send',{recipients:[{name:'self',role:'to'}],subject:subj,manual_subject:subj,purpose:'general',line_items:line_items});
  var chitId=send.j&&(send.j.chit_id||(send.j.chit&&send.j.chit.chit_id));
  if(chitId){ await api('POST','/api/capture/'+id+'/convert',{chit_id:chitId}); capEl.innerHTML='<div class="row"><span class="chn">'+esc(s.intent||'chit')+'</span> <span class="badge">✓ Created chit on the rail</span></div><div class="note" style="margin-top:4px">chit '+esc(chitId.slice(0,8))+' — open it in the main app.</div>'; }
  else { btn.disabled=false; btn.textContent='✓ Create chit on the rail'; capEl.querySelector('.cerr').textContent=(send.j&&send.j.message)||'Send failed'; }
}
async function dismiss(id){ await api('POST','/api/capture/'+id+'/dismiss'); load(); }

loginView();
</script>
</body>
</html>
