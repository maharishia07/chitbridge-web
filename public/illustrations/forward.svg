<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320" role="img" aria-label="Forward — same content, new sender and thread">
  <!-- subject: forward — a chit's content carried to a new recipient as a fresh thread (forwarded_from kept) -->
  <rect x="10" y="10" width="460" height="300" rx="18" fill="#F7F4EE" stroke="#E4DECF"/>
  <!-- original chit -->
  <g transform="translate(44,96)">
    <rect x="0" y="0" width="150" height="128" rx="11" fill="#FFFFFF" stroke="#D9E2E8"/>
    <rect x="0" y="0" width="150" height="26" rx="11" fill="#8FAAD0"/>
    <rect x="0" y="15" width="150" height="11" fill="#8FAAD0"/>
    <rect x="16" y="44" width="100" height="7" rx="3.5" fill="#E1E8ED"/>
    <rect x="16" y="62" width="118" height="7" rx="3.5" fill="#E1E8ED"/>
    <rect x="16" y="80" width="84" height="7" rx="3.5" fill="#E1E8ED"/>
    <text x="75" y="-10" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#7E8A91" text-anchor="middle">original</text>
  </g>
  <!-- forward arrow -->
  <g transform="translate(208,150)">
    <path d="M0 10 h44 v-12 l22 22 l-22 22 v-12 h-44 z" fill="#3F66A6"/>
  </g>
  <!-- forwarded chit (same content, new header) -->
  <g transform="translate(290,96)">
    <rect x="0" y="0" width="150" height="128" rx="11" fill="#FFFFFF" stroke="#B9D0EC"/>
    <rect x="0" y="0" width="150" height="26" rx="11" fill="#3F66A6"/>
    <rect x="0" y="15" width="150" height="11" fill="#3F66A6"/>
    <rect x="16" y="44" width="100" height="7" rx="3.5" fill="#E1E8ED"/>
    <rect x="16" y="62" width="118" height="7" rx="3.5" fill="#E1E8ED"/>
    <rect x="16" y="80" width="84" height="7" rx="3.5" fill="#E1E8ED"/>
    <!-- new recipient avatar -->
    <g transform="translate(110,86)">
      <circle cx="16" cy="16" r="16" fill="#E9F0F8" stroke="#B9D0EC"/>
      <circle cx="16" cy="12" r="6" fill="#8FAAD0"/>
      <path d="M5 28 a11 9 0 0 1 22 0 z" fill="#8FAAD0"/>
    </g>
    <text x="75" y="-10" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#3F66A6" text-anchor="middle">new thread</text>
  </g>
  <text x="240" y="262" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#7E8A91" text-anchor="middle">content unchanged · new sender · carries forwarded-from</text>
</svg>
