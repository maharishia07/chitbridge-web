<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="800" viewBox="0 0 1060 800" font-family="'Segoe UI',Arial,sans-serif">
  <!-- Chit & Bridge — the governed rail. Content-neutral, governance-absolute. -->
  <rect x="0" y="0" width="1060" height="800" fill="#ffffff"/>

  <!-- Title -->
  <text x="42" y="48" font-size="30" font-weight="800" fill="#23303d">Chit &amp; Bridge — a governed rail</text>
  <text x="42" y="76" font-size="15" fill="#3F66A6" font-weight="600">content-neutral · governance-absolute — a train can't leave the track</text>

  <!-- Network band (public map) -->
  <line x1="150" y1="116" x2="778" y2="116" stroke="#9aa8b6" stroke-width="2" stroke-dasharray="2 7" stroke-linecap="round"/>
  <g>
    <g><circle cx="210" cy="116" r="5" fill="#3F66A6"/><line x1="210" y1="116" x2="210" y2="132" stroke="#9aa8b6" stroke-width="1.5"/></g>
    <g><circle cx="380" cy="116" r="5" fill="#3F66A6"/><line x1="380" y1="116" x2="380" y2="132" stroke="#9aa8b6" stroke-width="1.5"/></g>
    <g><circle cx="560" cy="116" r="5" fill="#3F66A6"/><line x1="560" y1="116" x2="560" y2="132" stroke="#9aa8b6" stroke-width="1.5"/></g>
    <g><circle cx="730" cy="116" r="5" fill="#3F66A6"/><line x1="730" y1="116" x2="730" y2="132" stroke="#9aa8b6" stroke-width="1.5"/></g>
  </g>
  <text x="800" y="112" font-size="13" font-weight="700" fill="#2b3a4a">NETWORK</text>
  <text x="800" y="129" font-size="11.5" fill="#6b7580">destinations you reach — public map, private yards</text>

  <!-- Coupled bracket: travel together -->
  <path d="M158 274 V262 H902 V274" fill="none" stroke="#8a97a5" stroke-width="1.6" stroke-dasharray="4 5"/>
  <text x="530" y="255" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5a6672">coupled — they travel together (co-held), yet each keeps its own wagon</text>

  <!-- YOUR YARD (left) -->
  <rect x="40" y="288" width="150" height="200" rx="14" fill="#eef3fb" stroke="#cfe0f4" stroke-width="2"/>
  <text x="115" y="314" text-anchor="middle" font-size="13" font-weight="800" fill="#2b4a72">YOUR YARD</text>
  <text x="115" y="331" text-anchor="middle" font-size="10.5" fill="#6b7580">Entity A · private (RLS)</text>
  <g transform="translate(70,350)">
    <rect x="0" y="0" width="90" height="40" rx="8" fill="#fff" stroke="#3F66A6" stroke-width="2"/>
    <path d="M0 11 Q0 0 9 0 H81 Q90 0 90 11 Z" fill="#3F66A6"/>
    <text x="45" y="9.5" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">BUSINESS</text>
    <text x="45" y="30" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2b4a72">your copy</text>
    <circle cx="22" cy="46" r="6" fill="#3a4550"/><circle cx="68" cy="46" r="6" fill="#3a4550"/>
  </g>
  <g transform="translate(150,318)"><rect x="0" y="6" width="14" height="11" rx="2" fill="#a9791f"/><path d="M3 6 V3.6 A4 4 0 0 1 11 3.6 V6" fill="none" stroke="#a9791f" stroke-width="2"/><circle cx="7" cy="11" r="1.6" fill="#fff"/></g>

  <!-- THEIR YARD (right) -->
  <rect x="870" y="288" width="150" height="200" rx="14" fill="#eef3fb" stroke="#cfe0f4" stroke-width="2"/>
  <text x="945" y="314" text-anchor="middle" font-size="13" font-weight="800" fill="#2b4a72">THEIR YARD</text>
  <text x="945" y="331" text-anchor="middle" font-size="10.5" fill="#6b7580">Entity B · private (RLS)</text>
  <g transform="translate(900,350)">
    <rect x="0" y="0" width="90" height="40" rx="8" fill="#fff" stroke="#3F66A6" stroke-width="2"/>
    <path d="M0 11 Q0 0 9 0 H81 Q90 0 90 11 Z" fill="#3F66A6"/>
    <text x="45" y="9.5" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">BUSINESS</text>
    <text x="45" y="30" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2b4a72">their copy</text>
    <circle cx="22" cy="46" r="6" fill="#3a4550"/><circle cx="68" cy="46" r="6" fill="#3a4550"/>
  </g>
  <g transform="translate(982,318)"><rect x="0" y="6" width="14" height="11" rx="2" fill="#a9791f"/><path d="M3 6 V3.6 A4 4 0 0 1 11 3.6 V6" fill="none" stroke="#a9791f" stroke-width="2"/><circle cx="7" cy="11" r="1.6" fill="#fff"/></g>

  <!-- Roam band: a passenger walks the whole train, bogie to bogie -->
  <text x="530" y="310" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5a6672">one customer roams the whole train — never tied to one bogie</text>
  <g transform="translate(348,320)" stroke="#5a6672" stroke-width="2.4" fill="none" stroke-linecap="round">
    <circle cx="0" cy="-8" r="4.5" fill="#5a6672" stroke="none"/>
    <line x1="0" y1="-3" x2="0" y2="9"/>
    <line x1="0" y1="1" x2="-7" y2="6"/><line x1="0" y1="1" x2="8" y2="4"/>
    <line x1="0" y1="9" x2="-7" y2="20"/><line x1="0" y1="9" x2="8" y2="18"/>
  </g>
  <line x1="372" y1="326" x2="682" y2="326" stroke="#8a97a5" stroke-width="1.8" stroke-dasharray="3 5"/>
  <polygon points="694,326 682,320 682,332" fill="#8a97a5"/>

  <!-- The corridor rails + sleepers -->
  <g>
    <line x1="200" y1="418" x2="860" y2="418" stroke="#4a5a68" stroke-width="3"/>
    <line x1="200" y1="430" x2="860" y2="430" stroke="#4a5a68" stroke-width="3"/>
    <g stroke="#b7a184" stroke-width="4">
      <line x1="215" y1="416" x2="215" y2="432"/><line x1="255" y1="416" x2="255" y2="432"/><line x1="295" y1="416" x2="295" y2="432"/><line x1="335" y1="416" x2="335" y2="432"/><line x1="375" y1="416" x2="375" y2="432"/><line x1="415" y1="416" x2="415" y2="432"/><line x1="455" y1="416" x2="455" y2="432"/><line x1="495" y1="416" x2="495" y2="432"/><line x1="535" y1="416" x2="535" y2="432"/><line x1="575" y1="416" x2="575" y2="432"/><line x1="615" y1="416" x2="615" y2="432"/><line x1="655" y1="416" x2="655" y2="432"/><line x1="695" y1="416" x2="695" y2="432"/><line x1="735" y1="416" x2="735" y2="432"/><line x1="775" y1="416" x2="775" y2="432"/><line x1="815" y1="416" x2="815" y2="432"/><line x1="845" y1="416" x2="845" y2="432"/>
    </g>
  </g>

  <!-- The train: three coupled bogies = schemas (each a facility), sealed, cargo never inspected -->
  <g transform="translate(348,366)">
    <rect x="120" y="26" width="14" height="7" rx="2" fill="#8a97a5"/>
    <rect x="0" y="0" width="120" height="52" rx="10" fill="#ffffff" stroke="#3F66A6" stroke-width="2.5"/>
    <path d="M0 15 Q0 0 11 0 H109 Q120 0 120 15 Z" fill="#3F66A6"/>
    <text x="60" y="12" text-anchor="middle" font-size="9.5" font-weight="800" fill="#fff">YOUR BUSINESS</text>
    <rect x="14" y="26" width="20" height="15" rx="3" fill="#dce7f5" stroke="#a9c2e2"/><rect x="50" y="26" width="20" height="15" rx="3" fill="#dce7f5" stroke="#a9c2e2"/><rect x="86" y="26" width="20" height="15" rx="3" fill="#dce7f5" stroke="#a9c2e2"/>
    <circle cx="30" cy="52" r="8" fill="#3a4550"/><circle cx="30" cy="52" r="3" fill="#c9d3dd"/><circle cx="90" cy="52" r="8" fill="#3a4550"/><circle cx="90" cy="52" r="3" fill="#c9d3dd"/>
  </g>
  <g transform="translate(482,366)">
    <rect x="120" y="26" width="14" height="7" rx="2" fill="#8a97a5"/>
    <rect x="0" y="0" width="120" height="52" rx="10" fill="#ffffff" stroke="#3F66A6" stroke-width="2.5"/>
    <path d="M0 15 Q0 0 11 0 H109 Q120 0 120 15 Z" fill="#3F66A6"/>
    <text x="60" y="12" text-anchor="middle" font-size="9.5" font-weight="800" fill="#fff">YOUR BUSINESS</text>
    <rect x="14" y="26" width="20" height="15" rx="3" fill="#dce7f5" stroke="#a9c2e2"/><rect x="50" y="26" width="20" height="15" rx="3" fill="#dce7f5" stroke="#a9c2e2"/><rect x="86" y="26" width="20" height="15" rx="3" fill="#dce7f5" stroke="#a9c2e2"/>
    <circle cx="30" cy="52" r="8" fill="#3a4550"/><circle cx="30" cy="52" r="3" fill="#c9d3dd"/><circle cx="90" cy="52" r="8" fill="#3a4550"/><circle cx="90" cy="52" r="3" fill="#c9d3dd"/>
  </g>
  <g transform="translate(616,366)">
    <rect x="0" y="0" width="120" height="52" rx="10" fill="#ffffff" stroke="#3F66A6" stroke-width="2.5"/>
    <path d="M0 15 Q0 0 11 0 H109 Q120 0 120 15 Z" fill="#3F66A6"/>
    <text x="60" y="12" text-anchor="middle" font-size="9.5" font-weight="800" fill="#fff">YOUR BUSINESS</text>
    <rect x="14" y="26" width="20" height="15" rx="3" fill="#dce7f5" stroke="#a9c2e2"/><rect x="50" y="26" width="20" height="15" rx="3" fill="#dce7f5" stroke="#a9c2e2"/><rect x="86" y="26" width="20" height="15" rx="3" fill="#dce7f5" stroke="#a9c2e2"/>
    <circle cx="30" cy="52" r="8" fill="#3a4550"/><circle cx="30" cy="52" r="3" fill="#c9d3dd"/><circle cx="90" cy="52" r="8" fill="#3a4550"/><circle cx="90" cy="52" r="3" fill="#c9d3dd"/>
  </g>

  <!-- Facility labels under each bogie (different bogies = different facilities) -->
  <g transform="translate(408,452)"><rect x="-36" y="-13" width="72" height="24" rx="12" fill="#eef3fb" stroke="#cfe0f4"/><text x="0" y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#2b4a72">invoice</text></g>
  <g transform="translate(542,452)"><rect x="-36" y="-13" width="72" height="24" rx="12" fill="#eef3fb" stroke="#cfe0f4"/><text x="0" y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#2b4a72">payment</text></g>
  <g transform="translate(676,452)"><rect x="-36" y="-13" width="72" height="24" rx="12" fill="#eef3fb" stroke="#cfe0f4"/><text x="0" y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#2b4a72">service</text></g>
  <text x="542" y="484" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5a6672">each wagon is YOUR BUSINESS — a facility you define · sealed at dispatch · cargo never inspected</text>

  <!-- TASK direction (inbound, green, points left toward your yard) -->
  <text x="248" y="378" font-size="13" font-weight="800" fill="#2f8f5b">◂ TASK</text>
  <text x="248" y="393" font-size="10.5" fill="#3f7a5c">coming to you</text>
  <line x1="300" y1="408" x2="252" y2="408" stroke="#2f8f5b" stroke-width="3"/>
  <polygon points="240,408 254,401 254,415" fill="#2f8f5b"/>

  <!-- ORDER direction (outbound, blue, points right toward their yard) -->
  <text x="762" y="378" font-size="13" font-weight="800" fill="#2c5aa0">ORDER ▸</text>
  <text x="762" y="393" font-size="10.5" fill="#3a5c88">going from you</text>
  <line x1="760" y1="408" x2="808" y2="408" stroke="#2c5aa0" stroke-width="3"/>
  <polygon points="820,408 806,401 806,415" fill="#2c5aa0"/>

  <!-- Dispute siding -->
  <path d="M542 432 C 520 500, 470 500, 430 548" fill="none" stroke="#a9791f" stroke-width="2.5" stroke-dasharray="6 5"/>
  <rect x="230" y="548" width="330" height="104" rx="12" fill="#fbf7ea" stroke="#e6d9a8" stroke-width="2"/>
  <g transform="translate(250,566)"><rect x="0" y="7" width="16" height="12" rx="2" fill="#a9791f"/><path d="M3 7 V4 A5 5 0 0 1 13 4 V7" fill="none" stroke="#a9791f" stroke-width="2.2"/><circle cx="8" cy="13" r="1.8" fill="#fff"/></g>
  <text x="278" y="579" font-size="14" font-weight="800" fill="#8a6d1f">DISPUTE — a private siding</text>
  <text x="250" y="602" font-size="11.5" fill="#6b5a36">only the parties can enter; the rest of the network</text>
  <text x="250" y="619" font-size="11.5" fill="#6b5a36">runs straight past, seeing nothing. Each party keeps</text>
  <text x="250" y="636" font-size="11.5" fill="#6b5a36">its own copy of the claim; the raiser clears its own.</text>

  <!-- Key: the heavy lift -->
  <rect x="588" y="548" width="432" height="104" rx="12" fill="#f4f8fc" stroke="#cfe0f4" stroke-width="2"/>
  <text x="608" y="573" font-size="14" font-weight="800" fill="#2b4a72">The rail does the heavy lift</text>
  <text x="608" y="596" font-size="12" fill="#3a4c60">• the business loads the wagons — we never open them</text>
  <text x="608" y="615" font-size="12" fill="#3a4c60">• one-to-many = a sealed wagon to each yard, never shared</text>
  <text x="608" y="634" font-size="12" fill="#3a4c60">• governance = seal · isolate · prove (a train can't leave the track)</text>

  <!-- Essence footer -->
  <rect x="40" y="684" width="980" height="72" rx="12" fill="#23303d"/>
  <text x="530" y="716" text-anchor="middle" font-size="15.5" font-weight="700" fill="#ffffff">We don't define what happens between two entities — the business does.</text>
  <text x="530" y="740" text-anchor="middle" font-size="15.5" font-weight="700" fill="#8fb3e6">We guarantee that whatever happens is governed.</text>
</svg>
