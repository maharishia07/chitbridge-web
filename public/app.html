<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chit &amp; Bridge — app (build)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0F2E3D;--blue:#3F66A6;--blue-d:#345488;--gold:#C9A86A;--gold-soft:#F7F1E4;--gold-line:#E8D9BC;--paper:#FAF8F4;--card:#fff;--line:#E7E2D8;--grey:#7C8085;--ok:#2f8f5b;--prog:#9a7b34;--disp:#b4453f;--shadow:0 1px 2px rgba(15,46,61,.05),0 12px 34px rgba(15,46,61,.08)}
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  button,input,select{font:inherit}button{cursor:pointer}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#cfc7b8;border-radius:6px}
  #root{height:100vh;display:flex;flex-direction:column}
  .mono{font-family:'Space Mono'}.disp{font-family:'Space Grotesk'}

  /* mode ribbon */
  .moderibbon{background:var(--gold-soft);border-bottom:1px solid var(--gold-line);color:#6b5a36;font-size:11px;font-weight:600;padding:5px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .moderibbon b{font-family:'Space Grotesk'}
  .moderibbon .pill{background:#fff;border:1px solid var(--gold-line);border-radius:20px;padding:2px 9px;font-size:10px}
  .moderibbon .sw{margin-left:auto;display:flex;gap:6px}
  .moderibbon .sw button{border:1px solid var(--gold-line);background:#fff;border-radius:7px;font-size:10.5px;font-weight:700;padding:4px 9px;color:#6b5a36}
  .moderibbon .sw button.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* auth screens */
  .auth{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;overflow-y:auto;background:linear-gradient(160deg,#0F2E3D,#143b4e 60%,#1d4d61)}
  .card{width:440px;max-width:100%;background:#fff;border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
  .card .top{padding:22px 26px 8px;text-align:center}
  .brand{display:inline-flex;align-items:center;gap:10px;font-family:'Space Grotesk';font-weight:700;font-size:18px}
  .card h1{font-family:'Space Grotesk';font-size:20px;margin:14px 0 4px}.card .sub{font-size:12.5px;color:var(--grey);margin:0}
  .card .body{padding:8px 26px 24px}
  .tabs{display:flex;gap:4px;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:4px;margin:14px 0}
  .tabs button{flex:1;border:0;background:none;color:var(--grey);font-size:12px;font-weight:700;padding:9px 6px;border-radius:8px}
  .tabs button.on{background:#fff;color:var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.07)}
  label.fl{display:block;font-size:11px;font-weight:700;color:var(--grey);margin:12px 0 5px;text-transform:uppercase;letter-spacing:.04em}
  .inp{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14px;outline:0;background:var(--paper)}
  .inp:focus{border-color:var(--blue);background:#fff}
  .row2{display:flex;gap:10px}.row2>div{flex:1}
  .btn{width:100%;border:0;border-radius:11px;padding:13px;font-weight:700;font-size:14px;margin-top:16px;background:var(--ink);color:#fff}
  .btn.gold{background:linear-gradient(90deg,var(--gold),#b8945a);color:#3a2e16}
  .btn:disabled{opacity:.5}
  .swap{text-align:center;font-size:12.5px;color:var(--grey);margin-top:14px}.swap a{color:var(--blue);font-weight:700;cursor:pointer}
  .hint{font-size:11px;color:#9a7b34;background:var(--gold-soft);border:1px solid var(--gold-line);border-radius:9px;padding:9px 11px;margin-top:12px;line-height:1.5}
  .err{font-size:12px;color:var(--disp);background:#fbeeed;border:1px solid #e7b9b5;border-radius:9px;padding:9px 11px;margin-top:12px}

  /* app shell */
  .shell{flex:1;display:grid;grid-template-columns:212px 1fr;grid-template-rows:auto 1fr;min-height:0}
  .topbar{grid-column:1/3;height:52px;display:flex;align-items:center;gap:12px;padding:0 16px;background:var(--ink);color:#fff}
  .topbar .b{display:flex;align-items:center;gap:9px;font-family:'Space Grotesk';font-weight:700;font-size:14px}
  .topbar .who{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12px}
  .topbar .who .nm{font-weight:700}.topbar .who .rl{color:#9fb4bf;font-size:11px}
  .topbar .who .av{width:30px;height:30px;border-radius:50%;background:var(--gold);color:#3a2e16;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Space Grotesk'}
  .topbar .so{border:1px solid rgba(255,255,255,.25);background:none;color:#cfe0e8;border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
  .topbar .so:hover{background:rgba(255,255,255,.08)}
  .dutytog,.shoptog{display:flex;border-radius:9px;overflow:hidden;border:1px solid rgba(255,255,255,.18)}
  .dutytog button,.shoptog button{border:0;background:rgba(255,255,255,.05);color:#bcccd6;font-size:11px;font-weight:700;padding:6px 10px;display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap}
  .dutytog button.on.duty,.shoptog button.on.open{background:#1f7a4d;color:#fff}
  .dutytog button.on.brk,.shoptog button.on.away{background:var(--gold);color:#2c2410}
  .shoptog button.on.closed{background:#9a4040;color:#fff}
  .topbar .b .bt{margin-left:2px}
  .topbar .lo{border:1px solid rgba(255,255,255,.25);background:none;color:#cfe0e8;border-radius:8px;font-size:11px;font-weight:700;padding:6px 10px}
  .topbar .ham{display:none;border:0;background:none;color:#fff;font-size:20px}

  .menu{background:#0F2E3D;color:#bcccd6;padding:12px 10px;display:flex;flex-direction:column;overflow-y:auto;border-top:1px solid rgba(255,255,255,.06)}
  .menu .grp{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#5f7d8c;margin:10px 8px 5px}
  .menu button{display:flex;align-items:center;gap:10px;border:0;background:none;color:#bcccd6;text-align:left;font-size:13px;font-weight:500;padding:9px 10px;border-radius:9px;width:100%}
  .menu button .ic{width:16px;text-align:center}.menu button .ct{margin-left:auto;font-size:9.5px;background:rgba(255,255,255,.12);border-radius:10px;padding:1px 6px}
  .menu button:hover{background:rgba(255,255,255,.06)}.menu button.on{background:var(--blue);color:#fff}
  .menu .tagl{margin-top:auto;font-size:9.5px;color:#6f8b99;line-height:1.5;padding:8px}

  .main{min-width:0;display:flex;flex-direction:column;overflow:hidden;background:var(--paper)}
  .purpose{display:flex;align-items:center;gap:10px;padding:0 16px;max-height:0;overflow:hidden;background:#fff;font-size:12px;color:var(--mut,#5d6b73);transition:max-height .22s ease,padding .22s ease}
  .purpose.open{max-height:90px;padding:9px 16px;border-bottom:1px solid var(--line)}
  .purpose b{font-family:'Space Grotesk';color:var(--ink)}
  .purpose .x{margin-left:auto;border:0;background:none;color:var(--grey);font-size:14px;cursor:pointer}
  .topbar .info{border:0;background:none;color:#9fb4bf;font-size:16px;cursor:pointer;padding:2px 5px;line-height:1}
  .topbar .info.on{color:var(--gold)}

  .panel{flex:1;display:grid;grid-template-columns:var(--lw,340px) 7px minmax(0,1fr);min-height:0;position:relative}
  .list{display:flex;flex-direction:column;min-width:0;min-height:0;background:#fff}
  .lh{padding:10px 12px;border-bottom:1px solid var(--line)}
  .folders{display:flex;gap:4px;margin-bottom:8px}
  .folders button{flex:1;border:1px solid var(--line);background:var(--paper);color:var(--grey);font-size:12px;font-weight:700;padding:8px;border-radius:8px}
  .folders button.on{background:var(--blue);color:#fff;border-color:var(--blue)}
  .statetabs{display:flex;gap:3px;background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:3px;margin-bottom:8px}
  .statetabs button{flex:1;border:0;background:none;color:var(--grey);font-size:11px;font-weight:700;padding:6px;border-radius:6px;display:flex;align-items:center;justify-content:center;gap:5px}
  .statetabs button.on{background:#E3EDF8;color:var(--blue);box-shadow:inset 0 0 0 1.6px var(--blue);font-weight:800}
  .statetabs button.on .n{background:var(--blue);color:#fff}
  .statetabs .n{font-size:9px;background:rgba(0,0,0,.06);border-radius:9px;padding:0 5px}
  .srch{display:flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:12.5px;color:var(--grey)}
  .srch input{border:0;background:none;outline:0;font-size:12.5px;width:100%;color:var(--ink)}
  .tools{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
  .tool{width:30px;height:30px;border:1px solid var(--line);background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#54616a;position:relative}
  .tool.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .topbar .bell{position:relative;border:0;background:none;color:#cfe0e8;font-size:16px;cursor:pointer;padding:2px 4px;line-height:1}
  .topbar .bell .bdot{position:absolute;top:-2px;right:-3px;background:#d65a5a;color:#fff;font-size:8px;font-weight:800;min-width:13px;height:13px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px}
  .filterpanel{margin-top:8px;border:1px solid var(--line);border-radius:9px;background:#fff;padding:9px 11px;display:flex;flex-direction:column;gap:7px;font-size:12px}
  .filterpanel .fp-row{display:flex;align-items:center;gap:9px;justify-content:space-between}
  .filterpanel select{font-size:12px;padding:4px 6px;border:1px solid var(--line);border-radius:6px;background:#fff}
  .filterpanel label{display:flex;align-items:center;gap:6px;cursor:pointer}
  .filterpanel .fp-foot{display:flex;align-items:center;gap:10px;border-top:1px solid var(--line);padding-top:7px}
  .filterpanel .fp-foot button{border:1px solid var(--line);background:#fff;border-radius:7px;font-size:11px;font-weight:700;padding:4px 10px;color:var(--blue);cursor:pointer}
  .filterpanel .fp-note{margin-left:auto;font-size:9px;color:var(--grey);font-family:'Space Mono',monospace}
  .notifover{position:fixed;inset:0;z-index:250;background:rgba(8,24,32,.18)}
  .notifpanel{position:absolute;top:54px;right:14px;width:300px;max-width:88vw;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
  .notifhd{display:flex;align-items:center;font-family:'Space Grotesk';font-weight:700;font-size:13px;color:var(--ink);padding:11px 13px;border-bottom:1px solid var(--line)}
  .notifrow{display:flex;gap:10px;padding:10px 13px;border-bottom:1px solid var(--line)}
  .notifrow .ni{font-size:15px}.notifrow .nt{font-size:12.5px;color:var(--ink);line-height:1.35}.notifrow .ns{font-size:10px;color:var(--grey);margin-top:2px}
  .notiffoot{padding:8px 13px;font-size:10px;color:var(--grey);background:var(--paper)}
  .mover{position:fixed;inset:0;z-index:280;background:rgba(8,24,32,.45);display:flex;align-items:flex-start;justify-content:center;padding:56px 16px;overflow-y:auto}
  .modal{width:360px;max-width:94vw;background:#fff;border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
  .modal .mhd{padding:13px 16px;border-bottom:1px solid var(--line)}
  .modal .mhd .t{font-family:'Space Grotesk';font-weight:700;font-size:15px;color:var(--ink)}
  .modal .mhd .s{font-size:12px;color:var(--grey);margin-top:2px}
  .modal .mbody{padding:11px 12px;max-height:54vh;overflow-y:auto}
  .modal .mfoot{display:flex;gap:8px;padding:11px 13px;border-top:1px solid var(--line)}
  .modal .mfoot button{flex:1;border:1px solid var(--line);background:#fff;border-radius:9px;font-size:13px;font-weight:700;padding:9px;cursor:pointer;color:var(--ink)}
  .modal .mfoot button.pri{background:var(--blue);color:#fff;border-color:var(--blue)}
  .modal .mfoot button.danger{background:var(--disp);color:#fff;border-color:var(--disp)}
  .modal .mfoot button:disabled{opacity:.45;cursor:not-allowed}
  .modal textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px;font:inherit;font-size:13px;resize:vertical;min-height:62px;box-sizing:border-box}
  .optrow{display:flex;align-items:center;gap:11px;padding:10px 11px;border:1px solid var(--line);border-radius:10px;margin-bottom:6px;cursor:pointer}
  .optrow.sel{border:2px solid var(--blue);background:#EAF1F8}
  .optrow.dis{opacity:.5;cursor:not-allowed}
  .optrow .rdo{width:16px;height:16px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;display:flex;align-items:center;justify-content:center}
  .optrow.sel .rdo{border-color:var(--blue)}
  .optrow.sel .rdo::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--blue)}
  .optrow .oc{flex:1;min-width:0}.optrow .on{font-size:13px;font-weight:700;color:var(--ink)}.optrow .om{font-size:11px;color:var(--grey)}
  .optchip{font-size:9.5px;font-weight:700;border-radius:8px;padding:2px 8px;white-space:nowrap}
  .optchip.on{color:#1f7a4d;background:#e3f3ea}.optchip.brk{color:#8a6d1f;background:#f6edd6}.optchip.off{color:#777;background:#eee}
  .dtabs{flex-wrap:wrap}
  .dh{position:relative}
  .dmsg{position:absolute;top:0;right:0;border:1px solid #cfe0ec;background:#EAF1F6;color:var(--blue);font-size:11px;font-weight:700;border-radius:8px;padding:3px 9px;cursor:pointer}
  .rowmsg{font-size:9px;font-weight:700;color:#3f66a6;background:#EAF1F6;border:0.5px solid #cfe0ec;border-radius:5px;padding:0 5px;white-space:nowrap;cursor:pointer}
  .msglink{border:1px solid var(--line);background:#fff;color:var(--blue);font-size:12px;font-weight:700;border-radius:9px;padding:8px 13px;cursor:pointer}
  .msgtab{display:flex;flex-direction:column}
  .msgfilter{display:flex;gap:6px;margin-bottom:10px}
  .msgfilter button{border:1px solid var(--line);background:#fff;border-radius:8px;font-size:11px;font-weight:700;padding:5px 10px;color:var(--grey);cursor:pointer}
  .msgfilter button.on{background:#EAF1F8;color:var(--blue);border-color:var(--blue)}
  .thread{display:flex;flex-direction:column;margin-bottom:8px}
  .bubble{border:1px solid var(--line);padding:8px 11px;margin-bottom:8px;border-radius:0 10px 10px 0}
  .bubble.int{background:#f3f5f7;border-left:3px solid #8aa0ad}
  .bubble.ext{background:#eef5ff;border-left:3px solid var(--blue)}
  .bubble .bh{display:flex;align-items:center;gap:8px;margin-bottom:3px}
  .mbadge{font-size:9px;font-weight:700;border-radius:7px;padding:1px 7px}
  .mbadge.int{background:#e2e8ec;color:#4a5e6a}.mbadge.ext{background:#dbeafe;color:var(--blue)}
  .bubble .ath{font-size:11px;font-weight:700;color:var(--ink)}.bubble .tm{font-size:10px;color:var(--grey);margin-left:auto}
  .bubble .bb{font-size:13px;color:var(--ink);line-height:1.45}
  .msgempty{text-align:center;color:var(--grey);font-size:12px;padding:20px}
  .composer{border-top:1px solid var(--line);padding-top:10px;margin-top:2px}
  .chtoggle{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:7px}
  .chtoggle button{border:0;background:#fff;font-size:11px;font-weight:700;padding:5px 11px;color:var(--grey);cursor:pointer}
  .chtoggle button.int.on{background:#5f7682;color:#fff}.chtoggle button.ext.on{background:var(--blue);color:#fff}
  .chlabel{font-size:11px;font-weight:700;margin-bottom:7px}.chlabel.ext{color:var(--blue)}
  .composer textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px;font:inherit;font-size:13px;min-height:54px;resize:vertical;box-sizing:border-box}
  .composer .send{margin-top:7px;border:0;color:#fff;border-radius:9px;font-size:12.5px;font-weight:700;padding:8px 14px;cursor:pointer}
  .composer .send.int{background:#5f7682}.composer .send.ext{background:var(--blue)}
  .msghd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .msghd .mh-t{font-size:12px;font-weight:700;color:var(--ink)}
  .composebtn{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--blue);background:var(--blue);color:#fff;font-size:11.5px;font-weight:700;border-radius:8px;padding:5px 11px;cursor:pointer}
  .composebtn.on{background:#fff;color:var(--blue)}
  .msgtab .composer{margin-top:0;margin-bottom:12px;border-top:0;border:1px solid var(--line);border-radius:11px;padding:11px;background:#fbfcfe}
  .topbar .msgc{position:relative;border:0;background:none;color:#cfe0e8;font-size:15px;cursor:pointer;padding:2px 4px;line-height:1}
  .topbar .msgc .bdot{position:absolute;top:-2px;right:-3px;background:#d65a5a;color:#fff;font-size:8px;font-weight:800;min-width:13px;height:13px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px}
  .unreadtag{font-size:8.5px;font-weight:800;color:#fff;background:#d65a5a;border-radius:7px;padding:0 5px;margin-left:4px}
  .unreaddot{width:7px;height:7px;border-radius:50%;background:#d65a5a;margin-left:2px}
  .mtype{font-size:9px;font-weight:700;border-radius:6px;padding:1px 6px}
  .mtype.info{background:#eef2f6;color:#5a6b78}.mtype.query{background:#fbeede;color:#9a6b16}.mtype.decision{background:#e3f3ea;color:#1f7a4d}
  .typesel{display:flex;gap:5px;margin-bottom:7px}
  .typesel button{border:1px solid var(--line);background:#fff;border-radius:7px;font-size:10.5px;font-weight:700;padding:4px 9px;color:var(--grey);cursor:pointer}
  .typesel button.on.info{background:#eef2f6;color:#46566a;border-color:#9fb0bd}.typesel button.on.query{background:#fbeede;color:#9a6b16;border-color:#e0b878}.typesel button.on.decision{background:#e3f3ea;color:#1f7a4d;border-color:#8fc7a8}
  .msgfilter button.on.info{background:#eef2f6;color:#46566a;border-color:#9fb0bd}.msgfilter button.on.query{background:#fbeede;color:#9a6b16;border-color:#e0b878}.msgfilter button.on.decision{background:#e3f3ea;color:#1f7a4d;border-color:#8fc7a8}
  .mtype.risk{background:#fbe3d4;color:#b5531a}.mtype.assumption{background:#ece9f6;color:#6a5aa0}.mtype.issue{background:#fbe0e0;color:#c0392b}.mtype.dependency{background:#dff0f3;color:#1f6f7e}.mtype.action{background:#e2e9fb;color:#3a52b0}
  .typesel button.on.risk{background:#fbe3d4;color:#b5531a;border-color:#e8b48e}.typesel button.on.assumption{background:#ece9f6;color:#6a5aa0;border-color:#b9aede}.typesel button.on.issue{background:#fbe0e0;color:#c0392b;border-color:#e7a3a3}.typesel button.on.dependency{background:#dff0f3;color:#1f6f7e;border-color:#9cccd5}.typesel button.on.action{background:#e2e9fb;color:#3a52b0;border-color:#a7b6ea}
  .msgfilter button.on.risk{background:#fbe3d4;color:#b5531a;border-color:#e8b48e}.msgfilter button.on.assumption{background:#ece9f6;color:#6a5aa0;border-color:#b9aede}.msgfilter button.on.issue{background:#fbe0e0;color:#c0392b;border-color:#e7a3a3}.msgfilter button.on.dependency{background:#dff0f3;color:#1f6f7e;border-color:#9cccd5}.msgfilter button.on.action{background:#e2e9fb;color:#3a52b0;border-color:#a7b6ea}
  .notifpanel.raid{max-width:380px}
  .raidbody{padding:8px 12px 2px;max-height:46vh;overflow:auto}
  .raidrow{margin-bottom:12px}
  .raidrow .rl{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px}
  .raidrow .rl b{margin-left:auto;font-size:13px;color:var(--ink)}
  .rbar{height:7px;background:#eef1f4;border-radius:5px;overflow:hidden}
  .rbarfill{display:block;height:100%;border-radius:5px;background:var(--blue)}
  .rbarfill.info{background:#8aa0ad}.rbarfill.query{background:#d6a93a}.rbarfill.decision{background:#3fae6f}.rbarfill.risk{background:#d98a3a}.rbarfill.assumption{background:#8a78c0}.rbarfill.issue{background:#d6584f}.rbarfill.dependency{background:#3a93a3}.rbarfill.action{background:#5b72cf}

function fill(path,params){return path.replace(/:(\w+)/g,(_,k)=>encodeURIComponent((params&&params[k])??""));}
async function api(key, {params, query, body}={}){
  const ep = EP[key]; if(!ep) throw new Error("no endpoint "+key);
  if(CFG.MODE==="demo"){ await new Promise(r=>setTimeout(r,140)); return demoApi(key,{params,query,body}); }
  // LIVE
  let url = CFG.API_BASE + fill(ep.p, params);
  if(query){const q=new URLSearchParams(Object.entries(query).filter(([,v])=>v!=null&&v!=="")); if([...q].length)url+="?"+q;}
  const res = await fetch(url, {method:ep.m, headers:{"Content-Type":"application/json", ...(SESSION.token?{Authorization:"Bearer "+SESSION.token}:{})}, body: body?JSON.stringify(body):undefined});
  if(!res.ok){ let msg=""; try{ const j=await res.json(); msg=j.message||j.error||""; }catch(_){} throw new Error(msg||("API "+res.status+" "+ep.m+" "+ep.p)); }
  return res.status===204?null:res.json();
}
/* DEMO responder — mimics the API so the whole flow works standalone */
function demoApi(key,{params,query,body}){
  switch(key){
    case "register": return {ok:true, entityId:"e_demo", bridgeId:"rt-001"};
    case "ownerLogin": case "custVerify": return {otpSent:true};
    case "ownerVerify": return {token:"demo-owner", role:"entity", name:DEMO.entity.owner, entity:DEMO.entity.name};
    case "actorLogin": return {token:"demo-actor", role:"actor", name:"Priya", entity:DEMO.entity.name};
    case "custCatalogue": return {bridgeId:params.bridgeId, shop:"Raghavan Timber", products:[["Teak plank 8ft",3200],["Plywood 12mm",1266]]};
    case "custOrders": return {chits: STORE.chits.filter(c=>c.folder==="order").map(stripChit)};
    case "inbox": {
      let r = STORE.chits.filter(c=>c.folder==="task");
      if(SESSION.role==="actor" && query && query.assigned_to==="me") r=r.filter(c=>c.assignTo==="a1");
      if(query && query.status) r=r.filter(c=>c.state===query.status);
      return {chits:r.map(stripChit)};
    }
    case "sent": return {chits: STORE.chits.filter(c=>c.folder==="order").map(stripChit)};
    case "chit": return {chit: STORE.chits.find(c=>c.id==params.id)};
    case "advance": { const c=STORE.chits.find(x=>x.id==params.id); const o=["open","act","close"]; const i=o.indexOf(c.state); if(i<o.length-1)c.state=o[i+1]; return {chit:c}; }
    case "status": { const c=STORE.chits.find(x=>x.id==params.id); c.state=body.to; return {chit:c}; }
    case "assign": { const c=STORE.chits.find(x=>x.id==params.id); c.assignTo=body.assignee_id; if(body.priority)c.pri=body.priority; if(body.reason){ const an=(STORE.actors.find(a=>a.id===body.assignee_id)||{}).name||"actor"; const pl=body.priority?body.priority[0].toUpperCase()+body.priority.slice(1):"Normal"; c.msgs=c.msgs||[]; c.msgs.push({id:"m"+Date.now(),scope:"internal",author:SESSION.name||"You",body:"Assigned to "+an+" · "+pl+" — "+body.reason,at:"just now",type:"action",unread:false}); } return {chit:c}; }
    case "setPriority": { const c=STORE.chits.find(x=>x.id==params.id); if(c){ c.pri=body.priority; if(body.reason){ c.msgs=c.msgs||[]; c.msgs.push({id:"m"+Date.now(),scope:"internal",author:SESSION.name||"You",body:"Re-prioritised to "+(body.priority?body.priority[0].toUpperCase()+body.priority.slice(1):"Normal")+" — "+body.reason,at:"just now",type:"action",unread:false}); } } return {chit:c}; }
    case "custFlag": { const c=STORE.chits.find(x=>x.id==params.id); if(c)c.custPri=!!body.flag; return {chit:c}; }
    case "unassign": { const c=STORE.chits.find(x=>x.id==params.id); c.assignTo=null; return {chit:c}; }
    case "actors": return {actors: STORE.actors};
    case "messages": { const c=STORE.chits.find(x=>x.id==params.id); let ms=(c&&c.msgs)||[]; const sc=query&&query.scope; if(sc&&sc!=="all")ms=ms.filter(m=>m.scope===sc); return {messages:ms}; }
    case "sendMsg": { const c=STORE.chits.find(x=>x.id==params.id); if(c){ c.msgs=c.msgs||[]; c.msgs.push({id:"m"+Date.now(),scope:body.scope,author:SESSION.name||"You",body:body.body,at:"just now",type:body.type||"info",unread:false}); } return {ok:true}; }
    case "dispute": { const c=STORE.chits.find(x=>x.id==params.id); if(c)c.dispute=true; return {chit:c}; }
    case "delChit": { STORE.chits=STORE.chits.filter(x=>x.id!=params.id); return {ok:true, trashed:params.id}; }
    default: return {ok:true, demo:true};
  }
}
function stripChit(c){return {id:c.id,code:c.code,party:c.party,cust:c.cust,area:c.area,kind:c.kind,amt:c.amt,state:c.state,assignTo:c.assignTo,folder:c.folder,dispute:c.dispute,proof:c.proof,att:((c.atts?c.atts.length:0)+((c.items||[]).reduce((x,it)=>x+((it[2]&&it[2].length)||0),0))),msg:((c.msgs||[]).filter(m=>SESSION.role==="customer"?m.scope==="external":true).length),pri:(c.pri||"normal"),custPri:!!c.custPri};}

  const stTabs = `<div class="statetabs">${["open","act","close"].map(s=>`<button class="${UI.state===s?'on '+s:''}" onclick="setState('${s}')">${UI.selectMode&&!isCust?`<span class="cbx ${UI.aggStates.has(s)?'on':''}" style="width:13px;height:13px;margin:0" onclick="event.stopPropagation();toggleAgg('${s}')">${UI.aggStates.has(s)?'✓':''}</span>`:''}${cap(s)} <span class="n">${counts[s]}</span></button>`).join("")}</div>`;

      <div class="tool" title="Assign to actor" onclick="quickAssign()">👤</div>
      <div class="tool ${UI.filterOpen?'on':''}" title="Filter" onclick="openFilter()">${funnel}</div>
      <div class="tool ${UI.selectMode?'on':''}" title="Select" onclick="toggleSelect()">☑</div>
      <div class="tool" title="Raise dispute" onclick="quickDispute()">⚑</div>
      <div class="tool" title="Delete (move to trash)" onclick="quickDelete()">🗑️</div>
    </div>${UI.filterOpen?filterPanel():""}`;
  const sel = (UI.selectMode&&!isCust)?selBar():"";
  const list = `<div class="list">
    <div class="lh">${folders}${sub}${stTabs}
      <div class="srch">🔍 <input placeholder="${isCust?'Search my orders':'Search chits, party, item'}"></div>
      ${tools}${sel}
    </div>
    <div class="rows" id="rows">${UI.loading?'<div class="loadwrap"><span class="spin"></span> loading…</div>':renderRows()}</div>
  </div>`;
  const detail = `<div class="detail" id="detailpane">${renderDetail()}</div>`;

}
function countStates(){const o={open:0,act:0,close:0};UI.rows.forEach(c=>{if(o[c.state]!=null)o[c.state]++});return o;}
function cap(s){return s[0].toUpperCase()+s.slice(1);}
function setSub(s){UI.sub=s;UI.sel=null;UI.detail=null;renderApp();}
function setState(s){UI.state=s;renderApp();}
function toggleAgg(s){UI.aggStates.has(s)?(UI.aggStates.size>1&&UI.aggStates.delete(s)):UI.aggStates.add(s);renderApp();}
function toggleSelect(){UI.selectMode=!UI.selectMode;if(!UI.selectMode)UI.selected.clear();renderApp();}
function actionTargets(){ if(UI.selectMode && UI.selected.size) return [...UI.selected]; if(UI.sel) return [UI.sel]; return []; }
function needTarget(){ const t=actionTargets(); if(!t.length) toast("Open a chit — or tick some in Select — first."); return t; }
let MODALS={};
function modal(html){ const h=document.getElementById("modalhost"); if(!h)return; h.innerHTML=`<div class="mover" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">${html}</div></div>`; }
function closeModal(){ const h=document.getElementById("modalhost"); if(h)h.innerHTML=""; }
function quickStatus(){ const ids=needTarget(); if(!ids.length)return; MODALS.stat={ids,to:null};
  const opts=[["open","Open"],["act","Act"],["close","Close"]].map(([v,l])=>`<div class="optrow" data-v="${v}" onclick="pickStatus('${v}')"><span class="rdo"></span><div class="oc"><div class="on">${l}</div></div></div>`).join("");
  modal(`<div class="mhd"><div class="t">Change status</div><div class="s">${ids.length} chit${ids.length>1?'s':''}</div></div><div class="mbody">${opts}</div><div class="mfoot"><button onclick="closeModal()">Cancel</button><button class="pri" id="mok" disabled onclick="confirmStatus()">Set status</button></div>`);
}
function pickStatus(v){ MODALS.stat.to=v; document.querySelectorAll('.optrow').forEach(r=>r.classList.toggle('sel',r.dataset.v===v)); const b=document.getElementById('mok'); if(b)b.disabled=false; }
async function confirmStatus(){ const {ids,to}=MODALS.stat; if(!to)return; closeModal();
  for(const id of ids){ try{ await api("status",{params:{id},body:{status:({open:'pending',act:'in_progress',close:'completed'}[to]||to)}}); const i=UI.rows.findIndex(x=>x.id===id); if(i>=0)UI.rows[i].state=to; if(UI.detail&&UI.detail.id===id)UI.detail.state=to; }catch(e){ toast("Status failed: "+e.message); return; } }
  renderApp(); toast(ids.length+" → "+to.toUpperCase());
}
function quickAssign(){ const ids=needTarget(); if(!ids.length)return;

  const composer=isCust
    ? `<div class="composer">${typeSel}<div class="chlabel ext">↔ External · ${c.party||'the shop'} will see this</div><textarea id="msgbody" placeholder="Message to ${c.party||'the shop'}…"></textarea><button class="send ext" onclick="sendMessage(${c.id})">Send ${MTYPES[kind].label} ↔ external</button></div>`
    : `<div class="composer"><div class="chtoggle"><button class="int ${ch==='internal'?'on':''}" onclick="setMsgChan('internal')">🔒 Internal</button><button class="ext ${ch==='external'?'on':''}" onclick="setMsgChan('external')">↔ External</button></div>${typeSel}<textarea id="msgbody" placeholder="${ch==='internal'?'Note for your team — stays internal':'Message to '+(c.party||'the other party')+' — they will see this'}"></textarea><button class="send ${ch==='internal'?'int':'ext'}" onclick="sendMessage(${c.id})">Send ${MTYPES[kind].label} · ${ch==='internal'?'🔒 internal':'↔ external'}</button></div>`;
  const head=`<div class="msghd"><span class="mh-t">Messages (${msgCount(c)})</span><button class="composebtn ${open?'on':''}" onclick="toggleCompose()">${open?'✕ Close':'✏️ New message'}</button></div>`;
  return `<div class="msgtab">${head}${open?composer:''}${scopeFilter}${typeFilter}<div class="thread">${thread}</div></div>`;
}
function sendMessage(id){
  const el=document.getElementById('msgbody'); const body=(el?el.value:"").trim(); if(!body){ toast("Type a message first."); return; }
  const ch=UI.msgChan||(SESSION.role==="customer"?"external":"internal");
  if(ch==="external"){ const c=UI.detail||{}; modal(`<div class="mhd"><div class="t">↔ Send external message</div><div class="s">to ${c.party||'the other party'}</div></div><div class="mbody"><div style="font-size:13px;color:var(--ink);line-height:1.55">This <b>crosses the edge</b> — ${c.party||'they'} will see it and be notified. Internal notes never leave your team.</div></div><div class="mfoot"><button onclick="closeModal()">Cancel</button><button class="pri" onclick="closeModal();doSendMessage(${id},'external')">Send to ${c.party||'them'}</button></div>`); }
  else { doSendMessage(id,'internal'); }
}
async function doSendMessage(id, scope){
  const el=document.getElementById('msgbody'); const body=(el?el.value:"").trim(); if(!body)return;
  try{ await api("sendMsg",{params:{id},body:{thread_type:scope,message_text:body,msg_type:UI.msgKind||"info"}}); await openChit(id,true); }catch(e){ toast("Send failed: "+e.message); return; }
  const i=UI.rows.findIndex(x=>x.id===id); if(i>=0)UI.rows[i].msg=msgCount(UI.detail);
  paintDetail(); paintRowsOnly();
  toast(scope==='external'?'↔ Sent — '+((UI.detail&&UI.detail.party)||'the other party')+' notified':'🔒 Internal note added (team only)');
}
function unreadCount(){ let n=0; (STORE.chits||[]).forEach(c=>{ (c.msgs||[]).forEach(m=>{ if(m.unread && (SESSION.role!=="customer"||m.scope==="external")) n++; }); }); return n; }
function markChitRead(id){ const c=(STORE.chits||[]).find(x=>x.id==id); if(c)(c.msgs||[]).forEach(m=>m.unread=false); }
function refreshMsgBadge(){ const n=unreadCount(); const d=document.getElementById('msgcdot'); if(d){ d.textContent=n; d.style.display=n?'flex':'none'; } }
function openMsgCenter(){ const host=document.getElementById("lbhost"); if(!host)return; if(UI.msgcOpen){ closeMsgCenter(); return; } UI.msgcOpen=true;
  const items=(STORE.chits||[]).map(c=>{ const ms=(c.msgs||[]).filter(m=>SESSION.role!=="customer"||m.scope==="external"); if(!ms.length)return null; const last=ms[ms.length-1]; const unread=ms.filter(m=>m.unread).length; return {id:c.id,code:c.code,party:c.party,last,unread}; }).filter(Boolean).reverse();
  host.innerHTML=`<div class="notifover" onclick="closeMsgCenter()"><div class="notifpanel" onclick="event.stopPropagation()"><div class="notifhd">💬 Messages<span style="margin-left:auto;font-size:9px;color:var(--grey)">across all chits</span></div><div style="padding:8px 12px;border-bottom:1px solid var(--line)"><button class="msglink" style="width:100%" onclick="openRaidReport()">📊 RAID report — governance overview</button></div>${items.length?items.map(x=>`<div class="notifrow" style="cursor:pointer" onclick="openFromCenter(${x.id})"><span class="ni">${x.unread?'🔵':'💬'}</span><div style="flex:1;min-width:0"><div class="nt"><b>${x.code}</b> · ${x.party}${x.unread?` <span class="unreadtag">${x.unread} new</span>`:''}</div><div class="ns">${x.last?((x.last.scope==='external'?'↔ ':'🔒 ')+(x.last.body.length>44?x.last.body.slice(0,44)+'…':x.last.body)):''}</div></div></div>`).join(""):'<div class="notiffoot">No messages yet.</div>'}<div class="notiffoot">Tap a chit to open its conversation. External messages also land in the other party's message centre.</div><div class="raidtoggle">⚙ Message types: <button class="${SESSION.msgTypes!=='gov'?'on':''}" onclick="setMsgTypeSet('lean')">Lean</button><button class="${SESSION.msgTypes==='gov'?'on':''}" onclick="setMsgTypeSet('gov')">Governance (RAID)</button><div class="hint">A Settings preview — configurable per entity in production.</div></div></div></div>`;
}
function closeMsgCenter(){ UI.msgcOpen=false; const h=document.getElementById("lbhost"); if(h)h.innerHTML=""; }
function openFromCenter(id){ closeMsgCenter(); openChitMsgs(id); }
function setMsgTypeSet(mode){ SESSION.msgTypes=mode; if(!surfacedTypes().includes(UI.msgKind))UI.msgKind=surfacedTypes()[0]; if(UI.msgType!=="all" && !surfacedTypes().includes(UI.msgType))UI.msgType="all"; closeMsgCenter(); openMsgCenter(); paintDetail(); }
function openRaidReport(){ const host=document.getElementById("lbhost"); if(!host)return; UI.msgcOpen=false;
  const counts={}, samples={}; (STORE.chits||[]).forEach(c=>{ (c.msgs||[]).forEach(m=>{ if(SESSION.role==="customer"&&m.scope!=="external")return; const k=m.type||"info"; counts[k]=(counts[k]||0)+1; (samples[k]=samples[k]||[]); if(samples[k].length<3)samples[k].push({code:c.code,body:m.body}); }); });
  const keys=Object.keys(MTYPES).filter(k=>counts[k]); const total=keys.reduce((a,k)=>a+counts[k],0); const max=Math.max(1,...keys.map(k=>counts[k]));
  const rows=keys.length?keys.map(k=>{ const d=MTYPES[k]; const w=Math.round(counts[k]/max*100); return `<div class="raidrow"><div class="rl"><span class="mtype ${d.cls}">${d.icon} ${d.label}</span><b>${counts[k]}</b></div><div class="rbar"><span class="rbarfill ${d.cls}" style="width:${w}%"></span></div><div class="rsamp">${samples[k].map(x=>`<div>· <b>${x.code}</b> ${x.body.length>50?x.body.slice(0,50)+'…':x.body}</div>`).join("")}</div></div>`; }).join(""):'<div class="msgempty">No tagged messages in this period yet.</div>';
  host.innerHTML=`<div class="notifover" onclick="closeMsgCenter()"><div class="notifpanel raid" onclick="event.stopPropagation()"><div class="notifhd">📊 RAID report<span style="margin-left:auto;font-size:9px;color:var(--grey)">this period · ${total} items</span></div><div class="raidbody">${rows}</div><div class="notiffoot">Governance register rolled up from tagged messages across all chits. In production this is a backend report over a chosen period, per entity / oversight scope.</div></div></div>`;
}

/* actions wired to API */
async function advanceChit(id){
  const c=UI.rows.find(x=>x.id===id)||UI.detail; if(c&&c.state==="close"){toast("At Close — next is Archive (sunset model).");return;}
  const NB={pending:'accepted',delivered:'accepted',read:'accepted',accepted:'in_progress',in_progress:'completed',partial:'completed',finished:'completed'};
  const UIS={pending:'open',delivered:'open',read:'open',accepted:'act',in_progress:'act',partial:'act',completed:'close',cancelled:'close',rejected:'close'};
  const curB=(c&&c._status)||'pending', nextB=NB[curB];
  if(!nextB){ toast("Already at the final state."); return; }
  try{ await api("advance",{params:{id},body:{status:nextB}}); const i=UI.rows.findIndex(x=>x.id===id); if(i>=0){UI.rows[i]._status=nextB; UI.rows[i].state=UIS[nextB];} if(UI.detail&&UI.detail.id===id){UI.detail._status=nextB; UI.detail.state=UIS[nextB];} UI.state=UIS[nextB]; renderApp(); toast((c?c.code:"Chit")+" → "+(UIS[nextB]||nextB).toUpperCase()); }
  catch(e){ toast("Advance failed: "+e.message); }
}
async function assignChit(id, actorId, pri, reason){
  try{ const body={action:'push',target_actor_id:actorId}; if(pri)body.priority=pri; if(reason)body.reason=reason; await api("assign",{params:{id},body}); const i=UI.rows.findIndex(x=>x.id===id); if(i>=0){UI.rows[i].assignTo=actorId; if(pri)UI.rows[i].pri=pri;} if(UI.detail&&UI.detail.id===id)await openChit(id,true); renderApp();
    const a=(UI.actors||STORE.actors||[]).find(x=>x.id===actorId); const c=UI.rows.find(x=>x.id===id)||UI.detail; toast((c?c.code:"Chit")+" → "+(a?a.name:"actor")+(pri&&pri!=="normal"?" · "+PRI[pri].label:"")+" ✓", ()=>unassignChit(id)); }
  catch(e){ toast("Assign failed: "+e.message); }
}
async function unassignChit(id){ try{ await api("unassign",{params:{id},body:{action:'return'}}); const i=UI.rows.findIndex(x=>x.id===id); if(i>=0)UI.rows[i].assignTo=null; renderApp(); toast("Pushed back to pool"); }catch(e){toast("Failed: "+e.message);} }
async function pickAssign(id){
  let actors=[];
  try{ const r=await api("actors"); actors=(r.actors||[]).map(mapApiActor); }catch(e){ toast("Couldn't load actors: "+e.message); return; }
  UI.actors=actors; const c=UI.rows.find(x=>x.id===id)||UI.detail||{}; MODALS.pick={id, actorId:null, pri:(c.custPri?'urgent':'normal'), reason:''};
  const rows=actors.map(a=>{ const off=a.shift==="off";
    const chip=a.shift==="on_shift"?'<span class="optchip on">on shift</span>':a.shift==="on_break"?'<span class="optchip brk">on break</span>':'<span class="optchip off">off</span>';
    return `<div class="optrow ${off?'dis':''}" data-a="${a.id}" ${off?'':`onclick="pickActor('${a.id}')"`}><span class="rdo"></span><div class="oc"><div class="on">${a.name}</div><div class="om">load ${a.load}${off?' · off duty — cannot assign':''}</div></div>${chip}</div>`;
  }).join("");
  const prisel=`<div class="msec">Priority</div><div class="prisel">${["urgent","normal","low"].map(p=>`<button class="pri-${p} ${MODALS.pick.pri===p?'on':''}" data-p="${p}" onclick="pickPri('${p}')">${PRI[p].label}</button>`).join("")}</div>`;
  const reasonbox=`<div class="msec">Reason <span id="reasonhint" class="rh">${MODALS.pick.pri==='urgent'?'— Urgent needs one':'(optional)'}</span></div><textarea id="assignreason" class="mreason" placeholder="Why this assignment / this urgency…" oninput="MODALS.pick.reason=this.value;syncAssignOk()"></textarea>`;
  const custnote=c.custPri?`<div class="custreq">⚑ Customer flagged this as priority — consider Urgent.</div>`:'';
  modal(`<div class="mhd"><div class="t">Assign ${c.code||'chit'}</div><div class="s">${c.party||''}${c.amt?' · '+inr(c.amt):''}</div></div><div class="mbody">${custnote}${rows||'<div style="padding:14px;color:var(--grey);font-size:13px">No actors yet.</div>'}<div style="padding:6px 0 2px"><button class="composebtn" onclick="addActorModal()">+ New actor</button></div>${prisel}${reasonbox}</div><div class="mfoot"><button onclick="closeModal()">Cancel</button><button class="pri" id="mok" disabled onclick="confirmAssign()">Assign</button></div>`);
}
function pickActor(aid){ MODALS.pick.actorId=aid; document.querySelectorAll('.optrow').forEach(r=>r.classList.toggle('sel',r.dataset.a===aid)); syncAssignOk(); }
function pickPri(p){ MODALS.pick.pri=p; document.querySelectorAll('.prisel button').forEach(b=>b.classList.toggle('on',b.dataset.p===p)); const h=document.getElementById('reasonhint'); if(h)h.textContent=p==='urgent'?'— Urgent needs one':'(optional)'; syncAssignOk(); }
function syncAssignOk(){ const p=MODALS.pick; const b=document.getElementById('mok'); if(!b)return; const ok=p.actorId&&(p.pri!=='urgent'||(p.reason&&p.reason.trim())); b.disabled=!ok; const a=(UI.actors||[]).find(x=>x.id===p.actorId); b.textContent=p.actorId?("Assign · "+PRI[p.pri].label+" → "+(a?a.name:"actor")):"Assign"; }
function confirmAssign(){ const p=MODALS.pick; if(!p||!p.actorId)return; closeModal(); assignChit(p.id, p.actorId, p.pri, p.reason); }
function repriority(id){ const c=UI.detail||UI.rows.find(x=>x.id===id)||{}; MODALS.repri={id,pri:c.pri||"normal",reason:""};
  modal(`<div class="mhd"><div class="t">Priority — ${c.code||'chit'}</div><div class="s">internal routing in your queue</div></div><div class="mbody">${c.custPri?'<div class="custreq">⚑ Customer flagged this as priority.</div>':''}<div class="prisel">${["urgent","normal","low"].map(p=>`<button class="pri-${p} ${MODALS.repri.pri===p?'on':''}" data-p="${p}" onclick="pickRepri('${p}')">${PRI[p].label}</button>`).join("")}</div><div class="msec">Reason <span id="repriHint" class="rh">${MODALS.repri.pri==='urgent'?'— Urgent needs one':'(optional)'}</span></div><textarea id="reprireason" class="mreason" placeholder="Why this priority…" oninput="MODALS.repri.reason=this.value;syncRepriOk()"></textarea></div><div class="mfoot"><button onclick="closeModal()">Cancel</button><button class="pri" id="repriok" ${MODALS.repri.pri==='urgent'?'disabled':''} onclick="confirmRepri()">Set ${PRI[MODALS.repri.pri].label}</button></div>`); }
function pickRepri(p){ MODALS.repri.pri=p; document.querySelectorAll('.prisel button').forEach(b=>b.classList.toggle('on',b.dataset.p===p)); const h=document.getElementById('repriHint'); if(h)h.textContent=p==='urgent'?'— Urgent needs one':'(optional)'; syncRepriOk(); }
function syncRepriOk(){ const p=MODALS.repri; const b=document.getElementById('repriok'); if(!b)return; b.disabled=!(p.pri!=='urgent'||(p.reason&&p.reason.trim())); b.textContent="Set "+PRI[p.pri].label; }
async function confirmRepri(){ const p=MODALS.repri; closeModal(); try{ await api("setPriority",{params:{id:p.id},body:{priority:p.pri,reason:p.reason}}); const r=await api("chit",{params:{id:p.id}}); UI.detail=r.chit; const i=UI.rows.findIndex(x=>x.id===p.id); if(i>=0){UI.rows[i].pri=r.chit.pri; UI.rows[i].msg=msgCount(r.chit);} renderApp(); toast("Priority → "+PRI[p.pri].label); }catch(e){ toast("Failed: "+e.message); } }
async function toggleCustPri(id){ const c=UI.detail||{}; const nf=!c.custPri; try{ await api("custFlag",{params:{id},body:{flag:nf}}); const r=await api("chit",{params:{id}}); UI.detail=r.chit; const i=UI.rows.findIndex(x=>x.id===id); if(i>=0)UI.rows[i].custPri=r.chit.custPri; renderApp(); toast(nf?"⚑ Priority requested — the shop will see this":"Priority request removed"); }catch(e){ toast("Failed: "+e.message); } }

/* ---------------- bits ---------------- */
function val(id){const el=document.getElementById(id);return el?el.value.trim():"";}
function logoMark(s){return `<svg width="${s}" height="${s}" viewBox="0 0 32 32"><circle cx="16" cy="16" r="12.5" fill="none" stroke="#C9A86A" stroke-width="1.6"/><path d="M7 19 Q16 9 25 19" fill="none" stroke="#C9A86A" stroke-width="2.4" stroke-linecap="round"/><circle cx="7" cy="19" r="1.6" fill="#C9A86A"/><circle cx="25" cy="19" r="1.6" fill="#C9A86A"/></svg>`;}
function logo(){return `<div class="brand">${logoMark(26)} Chit &amp; Bridge</div>`;}
function modeRibbon(){
  const vpsw = SESSION.token ? `<span class="sw" style="margin-left:auto"><button class="${UI.vp==='lap'?'on':''}" onclick="setVP('lap')">💻 Laptop</button><button class="${UI.vp==='mob'?'on':''}" onclick="setVP('mob')">📱 Mobile</button></span>` : '';
  return `<div class="moderibbon">
    <b>Build preview</b><span class="pill">${CFG.MODE.toUpperCase()} mode</span>
    <span style="font-size:10.5px">${CFG.MODE==="demo"?"standalone · mock data":"hitting "+(CFG.API_BASE||"(API_BASE not set!)")}</span>
    ${vpsw}
    <span class="sw" style="${SESSION.token?'':'margin-left:auto'}"><button class="${CFG.MODE==='demo'?'on':''}" onclick="CFG.MODE='demo';STORE=deepClone(DEMO);route()">Demo</button><button class="${CFG.MODE==='live'?'on':''}" onclick="CFG.MODE='live';route()">Live</button></span>
  </div>`;
}

/* viewport + divider prefs (local; durable home = entity Settings, backlog) */
function lsGet(k,def){try{const v=localStorage.getItem(k);return v==null?def:v;}catch(e){return def;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function applyPrefs(){UI.vp=lsGet('cb_vp',(window.innerWidth<=820?'mob':'lap'));UI.lw=parseInt(lsGet('cb_lw',340),10)||340;UI.lh=parseInt(lsGet('cb_lh',300),10)||300;}
function setVP(v){UI.vp=v;lsSet('cb_vp',v);renderApp();}
let DRAG=false;
function startDrag(e){DRAG=true;e.preventDefault();document.body.style.userSelect='none';}
function onDrag(e){
  if(!DRAG)return;const panel=document.getElementById("panel");if(!panel)return;
  const r=panel.getBoundingClientRect();const pt=e.touches?e.touches[0]:e;
  if(UI.vp==='mob'){let h=pt.clientY-r.top;h=Math.max(120,Math.min(r.height-150,h));UI.lh=Math.round(h);panel.style.setProperty('--lh',UI.lh+'px');}
  else{let w=pt.clientX-r.left;w=Math.max(210,Math.min(r.width-260,w));UI.lw=Math.round(w);panel.style.setProperty('--lw',UI.lw+'px');}
}
function endDrag(){if(!DRAG)return;DRAG=false;document.body.style.userSelect='';lsSet('cb_lw',UI.lw);lsSet('cb_lh',UI.lh);}
document.addEventListener('mousemove',onDrag);document.addEventListener('touchmove',onDrag,{passive:false});
document.addEventListener('mouseup',endDrag);document.addEventListener('touchend',endDrag);

/* attachments + lightbox */
function attsVis(atts){return (atts||[]);}  /* DEC: customer sees the full co-signed set — both parties co-hold every attachment */
function attIcon(t){return t==='video'?'▶':t==='doc'?'📄':'🖼️';}
function attMedia(a,size){
  const big=size==='hero'||size==='lb';
  const bg=a.t==='image'?'#E8F0F4':a.t==='video'?'#F7F1E4':'#F1EFE8';
  return `<div class="attImg ${big?'big':''}" style="background:${bg}"><span style="font-size:${big?'40px':'20px'}">${attIcon(a.t)}</span>${a.t==='video'?'<span class="vlen">0:12</span>':''}</div>`;
}
/* build the visible attachment groups for the current chit: line0, line1 … + chit */
function buildAttGroups(c){
  const g={};
  (c.items||[]).forEach((it,idx)=>{const a=attsVis(it[2]);if(a.length)g['line'+idx]=a;});
  const chit=attsVis(c.atts); if(chit.length)g['chit']=chit;
  UI.attGroups=g;
}
/* items table — each line shows a clip + expandable image strip scoped to that line */
function contentItems(c){
  return (c.items||[]).map((it,idx)=>{
    const atts=attsVis(it[2]);
    const open=UI.openLines.has('line'+idx);
    const clip=atts.length?`<span class="lineclip" onclick="event.stopPropagation();toggleLine(${idx})">📎 ${atts.length} ${open?'▾':'▸'}</span>`:"";
    const strip=(atts.length&&open)?`<div class="lineImgs">${atts.map((a,i)=>`<div class="attThumb" onclick="openLightbox('line${idx}',${i})" title="${a.n}">${attMedia(a,'thumb')}</div>`).join("")}</div>`:"";
    return `<div class="ir ${atts.length?'hasatt':''}" ${atts.length?`onclick="toggleLine(${idx})"`:''}><span class="nm">${it[0]}</span><span class="qt">${it[1]}</span>${clip}</div>${strip}`;
  }).join("");
}
function toggleLine(idx){const k='line'+idx;UI.openLines.has(k)?UI.openLines.delete(k):UI.openLines.add(k);paintDetail();}
/* whole-chit attachments (documents, clips not tied to one line) */
function chitAttBlock(c){
  const atts=attsVis(c.atts);
  if(!atts.length) return "";
  const hero=atts[0], rest=atts.slice(1);
  return `<div class="sec" style="display:flex;align-items:center;gap:7px">📎 Whole-chit attachments · ${atts.length}<span style="margin-left:auto;font-size:9px;color:var(--ok);font-weight:700">✓ co-signed</span></div>
    <div class="attHero" onclick="openLightbox('chit',0)">${attMedia(hero,'hero')}<div class="attName">${attIcon(hero.t)} ${hero.n} · tap to open</div></div>
    ${rest.length?`<div class="attStrip">${rest.map((a,i)=>`<div class="attThumb" onclick="openLightbox('chit',${i+1})" title="${a.n}">${attMedia(a,'thumb')}</div>`).join("")}</div>`:""}
    <div class="attNote">Part of the co-signed record — both parties hold the same set &amp; leaves with the chit on sunset.</div>`;
}
function openLightbox(group,i){UI.lbGroup=group;UI.lb=i;paintLB();}
function closeLightbox(){UI.lb=null;paintLB();}
function lbNav(d){const atts=UI.attGroups[UI.lbGroup]||[];if(!atts.length)return;UI.lb=(UI.lb+d+atts.length)%atts.length;paintLB();}
function paintLB(){
  const host=document.getElementById("lbhost");if(!host)return;
  const atts=UI.attGroups[UI.lbGroup]||[];
  if(UI.lb==null||!atts.length){host.innerHTML="";return;}
  const i=Math.min(UI.lb,atts.length-1),a=atts[i];
  host.innerHTML=`<div class="lbover" onclick="closeLightbox()"><div class="lbbox" onclick="event.stopPropagation()">
    <div class="lbtop"><span>${a.n}</span><span style="font-weight:400;color:#9fb4bf">${i+1} / ${atts.length}</span><span style="margin-left:auto;cursor:pointer" onclick="toast('Download — wired live (GET attachment)')">⬇</span><span class="x" onclick="closeLightbox()">✕</span></div>
    <div class="lbstage">${attMedia(a,'lb')}</div>
    <div class="lbnav"><button onclick="lbNav(-1)" aria-label="Previous">‹</button><div class="lbdots">${atts.map((_,k)=>`<span class="${k===i?'on':''}"></span>`).join("")}</div><button onclick="lbNav(1)" aria-label="Next">›</button></div>
  </div></div>`;
}

/* boot */
applyPrefs();
if(!location.hash) location.hash="#/login";
route();
</script>
