<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320" role="img" aria-label="Attachment co-signed with the chit">
  <!-- subject: attachment — a chit carrying a co-signed photo + document, held by a clip -->
  <rect x="10" y="10" width="460" height="300" rx="18" fill="#F7F4EE" stroke="#E4DECF"/>
  <!-- chit card -->
  <g transform="translate(58,70)">
    <rect x="0" y="0" width="190" height="184" rx="12" fill="#FFFFFF" stroke="#D9E2E8"/>
    <rect x="0" y="0" width="190" height="32" rx="12" fill="#3F66A6"/>
    <rect x="0" y="20" width="190" height="12" fill="#3F66A6"/>
    <rect x="20" y="50" width="120" height="8" rx="4" fill="#E1E8ED"/>
    <rect x="20" y="72" width="150" height="8" rx="4" fill="#E1E8ED"/>
    <!-- inline thumbnails -->
    <rect x="20" y="100" width="64" height="64" rx="8" fill="#E9F0F8" stroke="#B9D0EC"/>
    <circle cx="40" cy="124" r="8" fill="#8FAAD0"/>
    <path d="M24 158 l18 -20 l14 14 l10 -8 l16 16 z" fill="#AFC8E8"/>
    <rect x="96" y="100" width="64" height="64" rx="8" fill="#F5ECD6" stroke="#E0CE9F"/>
    <path d="M118 114 h26 v36 h-26 z" fill="#fff" stroke="#C9B47E" stroke-width="1.5"/>
    <rect x="123" y="122" width="16" height="3" fill="#D9C38C"/>
    <rect x="123" y="129" width="16" height="3" fill="#D9C38C"/>
    <rect x="123" y="136" width="11" height="3" fill="#D9C38C"/>
  </g>
  <!-- paperclip -->
  <g transform="translate(250,46) rotate(18)" fill="none" stroke="#5F6B70" stroke-width="6" stroke-linecap="round">
    <path d="M20 14 v54 a18 18 0 0 0 36 0 v-44 a11 11 0 0 0 -22 0 v40 a4 4 0 0 0 8 0 v-34"/>
  </g>
  <!-- co-signed badge -->
  <g transform="translate(300,210)">
    <rect x="0" y="0" width="118" height="34" rx="17" fill="#E4F0E9" stroke="#B7DAC6"/>
    <path d="M16 17 l5 5 l9 -11" fill="none" stroke="#3E8A5F" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="22" font-family="Segoe UI, sans-serif" font-size="12.5" font-weight="700" fill="#2F6B49">co-signed</text>
  </g>
</svg>
