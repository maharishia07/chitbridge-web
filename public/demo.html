// What ONE entity actually sees (mirrors the dev isolation rule): its private
// chits + shared deals as its OWN copy; messages = external (both) OR own internal.
function viewAs(side){
  const e = THEATRE.entities[side];
  const shared = THEATRE.shared.filter(d => d.a===side || d.b===side).map(d => ({
    shared:true, deal:d.deal, title:d.title, amt:d.amt,
    role:d.copies[side].role, dir:d.copies[side].dir, state:d.copies[side].state,
    other: THEATRE.entities[d.a===side ? d.b : d.a].name,
    msgs: d.msgs.filter(m => m.scope==="external" || m.by===side)
  }));
  const priv = e.private.map(c => ({shared:false, code:c.code, title:c.with, kind:c.kind, amt:c.amt, state:c.state}));
  return { entity:e, chits: priv.concat(shared) };
}

// "Done = this passes." Asserts two-copy completeness, message scoping, isolation.
function theatreConsistency(){
  const p=[];
  THEATRE.shared.forEach(d=>{
    if(!d.copies[d.a] || !d.copies[d.b]) p.push(d.deal+": missing a side copy");
    d.msgs.forEach(m=>{
      if(m.scope!=="external" && m.scope!=="internal") p.push(d.deal+": bad scope "+m.scope);
      if(m.by!==d.a && m.by!==d.b) p.push(d.deal+": message owner "+m.by+" is not a party");
    });
  });
  const rCodes=viewAs("rt").chits.map(c=>c.code).filter(Boolean);
  const sCodes=viewAs("st").chits.map(c=>c.code).filter(Boolean);
  THEATRE.entities.rt.private.forEach(c=>{ if(sCodes.includes(c.code)) p.push("ISOLATION leak: st sees rt private "+c.code); });
  THEATRE.entities.st.private.forEach(c=>{ if(rCodes.includes(c.code)) p.push("ISOLATION leak: rt sees st private "+c.code); });
  return {ok:p.length===0, problems:p};
}

function theatreColumnHTML(side){
  const v=viewAs(side), e=v.entity;
  const rows = v.chits.map(c=>{
    if(c.shared){
      const msgs = c.msgs.map(m=>`<div class="tco-msg tco-${m.scope}"><span class="tco-scope">${m.scope}</span><b>${esc(m.who)}</b> ${esc(m.body)}</div>`).join("");
      return `<div class="tco-chit tco-sh">
        <div class="tco-ch-h"><span class="tco-code">${esc(c.deal)} · ${esc(c.role)}</span><span class="tco-amt">${THEATRE.fmt(c.amt)}</span></div>
        <div class="tco-sub">${esc(c.dir)} ${esc(c.other)} · <b>${esc(c.state)}</b> <span class="tco-tag tco-tsh">shared</span></div>
        <div class="tco-msgs">${msgs}</div></div>`;
    }
    return `<div class="tco-chit">
      <div class="tco-ch-h"><span class="tco-code">${esc(c.code)} · ${esc(c.kind)}</span><span class="tco-amt">${c.amt?THEATRE.fmt(c.amt):"—"}</span></div>
      <div class="tco-sub">${esc(c.title)} · <b>${esc(c.state)}</b> <span class="tco-tag tco-tpv">private</span></div></div>`;
  }).join("");
  return `<div class="tco-col">
    <div class="tco-ctop"><div class="tco-ent">${esc(e.name)}</div><div class="tco-trade">${esc(e.trade)} · signed in as ${esc(e.owner)} · ${esc(e.bridge)}</div></div>
    <div class="tco-list">${rows}</div></div>`;
}

function theatreStageHTML(){
  const chk=theatreConsistency();
  const tick=THEATRE.ticker.concat(THEATRE.ticker).map(t=>`<span class="tco-tk">${esc(t)}</span>`).join("");
  return `<div class="tco-bar">
      <div class="tco-ttl">🎬 Live demo — one network, two businesses</div>
      <button class="tco-btn" onclick="startPlayer()" style="margin-left:auto">▶ Play the story</button>

    <div class="tco-stage">${theatreColumnHTML("rt")}<div class="tco-vs">↔</div>${theatreColumnHTML("st")}</div>

    <div class="tco-ticker"><div class="tco-track">${tick}</div></div>`;
}

function applyTo(i){
  var last=SCENE1.length-1; if(i<0)i=0; if(i>last)i=last;
  initPanes();
  for(var k=0;k<=i;k++){ try{ SCENE1[k].run(k===i); }catch(e){} }
  PLAYER.step=i; var sc=SCENE1[i]; PLAYER.narr={t:sc.t,s:sc.s,look:sc.look};
  renderPlayer();
}

  host.innerHTML =
    '<div class="tco-bar"><div class="tco-ttl">🎬 '+esc(SCENE.title)+'</div>'
    + '<button class="tco-btn" onclick="exploreSnapshot()" style="margin-left:auto">Explore snapshot</button>'
    + '<button class="tco-x" onclick="closeTheatre()" aria-label="Close">✕</button></div>'
    + '<div class="tco-narr"><div class="tco-narr-t">'+esc(s.t||"")+'</div><div class="tco-narr-s">'+esc(s.s||"")+'</div>'+(s.look?'<div class="tco-look">👁 '+esc(s.look)+'</div>':'')+'</div>'
    + '<div class="tco-stage">'+playerPaneHTML("rt")+'<div class="tco-vs">↔</div>'+playerPaneHTML("st")
      + (st.fly?'<div class="tco-flywrap"><div class="tco-fly">📦 '+esc(st.flyLabel||"Order")+'</div></div>':'')
    + '</div>'
    + '<div class="tco-ctrls">'
      + '<button class="tco-btn" onclick="playerBack()" '+(st.step<=0?"disabled":"")+'>◀ Back</button>'
      + '<button class="tco-btn" onclick="playerToggle()">'+(st.playing?"⏸ Pause":"▶ Play")+'</button>'
      + '<button class="tco-btn" onclick="playerNext()" '+(st.step>=last?"disabled":"")+'>Next ▶</button>'
      + '<button class="tco-btn" onclick="playerReplay()">↺ Replay</button>'
      + '<label style="font-size:11px;display:flex;align-items:center;gap:5px">Speed <select class="tco-speed" onchange="playerSpeed(this.value)">'
        + '<option value="1.6" '+(st.speed==1.6?"selected":"")+'>Slow</option>'
        + '<option value="1" '+(st.speed==1?"selected":"")+'>Normal</option>'
        + '<option value="0.6" '+(st.speed==0.6?"selected":"")+'>Fast</option></select></label>'
      + '<span class="tco-prog">Step '+(st.step+1)+' / '+SCENE1.length+'</span>'
    + '</div>'
    + '<div class="tco-ticker"><div class="tco-track">'+tick+'</div></div>';
}

function playerNext(){ if(PLAYER.step<SCENE1.length-1) applyTo(PLAYER.step+1); }
function playerBack(){ if(PLAYER.step>0) applyTo(PLAYER.step-1); }
function playerReplay(){ PLAYER.playing=false; clearTimeout(PLAYER.timer); applyTo(0); }
function playerSpeed(v){ PLAYER.speed=parseFloat(v)||1; if(PLAYER.playing){ clearTimeout(PLAYER.timer); playerTick(); } }
function playerToggle(){ PLAYER.playing=!PLAYER.playing; if(PLAYER.playing){ if(PLAYER.step>=SCENE1.length-1) applyTo(0); playerTick(); } else { clearTimeout(PLAYER.timer); } renderPlayer(); }
function playerTick(){ clearTimeout(PLAYER.timer); if(!PLAYER.playing)return; var last=SCENE1.length-1; if(PLAYER.step>=last){ PLAYER.playing=false; renderPlayer(); return; } var dwell=((SCENE1[PLAYER.step]&&SCENE1[PLAYER.step].dwell)||2600)*PLAYER.speed; PLAYER.timer=setTimeout(function(){ applyTo(PLAYER.step+1); playerTick(); }, dwell); }

function startPlayer(){ ensureTheatreCSS(); var h=document.getElementById("tco-host"); if(!h){ h=document.createElement("div"); h.id="tco-host"; h.className="tco-host"; document.body.appendChild(h); } h.style.display="flex"; PLAYER.playing=false; PLAYER.speed=1; clearTimeout(PLAYER.timer); applyTo(0); }
function openTheatre(){ startPlayer(); }
function exploreSnapshot(){ PLAYER.playing=false; clearTimeout(PLAYER.timer); var h=document.getElementById("tco-host"); if(h) h.innerHTML=theatreStageHTML(); }
function closeTheatre(){ PLAYER.playing=false; clearTimeout(PLAYER.timer); var h=document.getElementById("tco-host"); if(h){ h.style.display="none"; h.innerHTML=""; } }
function mountTheatreLauncher(){
  try{ if(!(typeof CFG!=="undefined" && CFG.MODE==="demo")) return; }catch(_){ return; }
  if(document.getElementById("tco-launch")) return;
  ensureTheatreCSS();
  const b=document.createElement("button"); b.id="tco-launch"; b.className="tco-launch";
  b.textContent="🎬 See both sides"; b.title="Live side-by-side demo — two businesses at once";
  b.onclick=openTheatre; document.body.appendChild(b);
}

// The page IS the theatre: open on load; the close button restarts (never blanks).
closeTheatre = function(){ startPlayer(); };
openTheatre();
</script>
</body>
</html>
