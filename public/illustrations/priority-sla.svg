<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320" role="img" aria-label="Priority and SLA">
  <!-- subject: priority-sla — an urgent chit against a delivery clock (SLA / ISL) -->
  <rect x="10" y="10" width="460" height="300" rx="18" fill="#F7F4EE" stroke="#E4DECF"/>
  <!-- chit card -->
  <g transform="translate(54,80)">
    <rect x="0" y="0" width="180" height="160" rx="12" fill="#FFFFFF" stroke="#D9E2E8"/>
    <rect x="0" y="0" width="180" height="32" rx="12" fill="#C2473F"/>
    <rect x="0" y="20" width="180" height="12" fill="#C2473F"/>
    <rect x="18" y="50" width="120" height="8" rx="4" fill="#E1E8ED"/>
    <rect x="18" y="72" width="146" height="8" rx="4" fill="#E1E8ED"/>
    <rect x="18" y="100" width="100" height="8" rx="4" fill="#F4D9D6"/>
    <rect x="18" y="122" width="130" height="8" rx="4" fill="#F4D9D6"/>
    <!-- urgent badge -->
    <g transform="translate(118,-16)">
      <rect x="0" y="0" width="78" height="30" rx="15" fill="#C2473F"/>
      <text x="39" y="20" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Urgent</text>
    </g>
  </g>
  <!-- SLA clock / ring -->
  <g transform="translate(330,160)">
    <circle cx="0" cy="0" r="56" fill="#fff" stroke="#E4DECF" stroke-width="3"/>
    <!-- elapsed arc -->
    <path d="M0 -56 A56 56 0 0 1 48 28" fill="none" stroke="#C08A2E" stroke-width="8" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="40" fill="#F5ECD6"/>
    <!-- hands -->
    <line x1="0" y1="0" x2="0" y2="-26" stroke="#243441" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="20" y2="8" stroke="#C2473F" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="4" fill="#243441"/>
    <text x="0" y="84" font-family="Segoe UI, sans-serif" font-size="12.5" font-weight="700" fill="#6b5a36" text-anchor="middle">SLA · time left</text>
  </g>
</svg>
