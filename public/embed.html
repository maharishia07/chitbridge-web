<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catalogue</title>
<style>
  :root{ --ink:#1e2530; --grey:#6a7686; --line:#e7e9ee; --bg:#ffffff; --card:#ffffff; --accent:#3F66A6; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
  .wrap{ max-width:1040px; margin:0 auto; padding:16px; }
  .brand{ display:flex; align-items:center; gap:12px; padding:6px 0 16px; border-bottom:1px solid var(--line); margin-bottom:16px; }
  .logo{ width:42px; height:42px; border-radius:11px; background:#eef3fb; display:flex; align-items:center; justify-content:center; font-size:21px; flex:0 0 auto; }
  .bname{ font-weight:800; font-size:17px; }
  .bmeta{ font-size:11.5px; color:var(--grey); }
  .badge{ font-size:10px; font-weight:800; letter-spacing:.03em; border-radius:6px; padding:2px 7px; background:#eaf6ee; color:#2f7a45; }
  .sechd{ font-size:11px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--grey); margin:20px 2px 10px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
  .card{ border:1px solid var(--line); border-radius:14px; background:var(--card); overflow:hidden; display:flex; flex-direction:column; }
  .thumb{ width:100%; aspect-ratio:4/3; object-fit:cover; background:#f4f6fa; display:block; }
  .noimg{ width:100%; aspect-ratio:4/3; background:linear-gradient(135deg,#eef2f8,#e3e9f2); display:flex; align-items:center; justify-content:center; font-size:30px; color:#b7c2d4; }
  .cbody{ padding:12px 13px 14px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .fname{ font-weight:700; font-size:14px; line-height:1.25; }
  .meta{ font-size:11px; color:var(--grey); }
  .cclabel{ font-size:9.5px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:var(--grey); margin-top:4px; }
  .combo{ display:flex; align-items:center; gap:7px; }
  .dots{ display:inline-flex; gap:3px; flex:0 0 auto; }
  .dot{ width:13px; height:13px; border-radius:50%; border:1px solid rgba(0,0,0,.12); display:inline-block; }
  .cbname{ font-size:11.5px; font-weight:600; }
  .price{ margin-top:auto; padding-top:8px; font-weight:800; font-size:14px; }
  .prow{ display:flex; align-items:center; gap:10px; padding:11px 2px; border-bottom:1px dashed var(--line); }
  .foot{ margin:22px 2px 6px; font-size:10.5px; color:#aab3c0; text-align:center; }
  .empty{ padding:40px 16px; text-align:center; color:var(--grey); font-size:14px; }
  @media (prefers-color-scheme: dark){
    :root{ --ink:#e8ecf2; --grey:#9aa6b6; --line:#2a3240; --bg:#12161d; --card:#171c25; }
    .logo{ background:#1f2a3a; } .noimg{ background:linear-gradient(135deg,#1c232f,#232c3a); color:#3f4b5e; } .thumb{ background:#1c232f; }
    .badge{ background:#14361f; color:#5fce88; }
  }
  :root[data-theme="light"]{ --ink:#1e2530; --grey:#6a7686; --line:#e7e9ee; --bg:#ffffff; --card:#ffffff; }
  :root[data-theme="dark"]{ --ink:#e8ecf2; --grey:#9aa6b6; --line:#2a3240; --bg:#12161d; --card:#171c25; }
</style>
</head>
<body>
<div class="wrap"><div id="app"><div class="empty">Loading catalogue…</div></div></div>
<script>
(function(){
  var Q = new URLSearchParams(location.search);
  var API = Q.get('api') || 'https://chitbridge-api-production.up.railway.app';
  var BRIDGE = (Q.get('bridge') || Q.get('b') || '').trim();
  var BRAND = Q.get('brand') !== 'off';           // brand shown unless brand=off (whitelabel)
  if (Q.get('theme') === 'light' || Q.get('theme') === 'dark') document.documentElement.setAttribute('data-theme', Q.get('theme'));
  var CURSYM = { INR:'₹', USD:'$', EUR:'€', GBP:'£', AED:'AED ', SGD:'S$', JPY:'¥' };
  var CUR = 'INR';
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function price(v){ if (v==null || v==='') return ''; var s=CURSYM[CUR]||(CUR+' '); return s + String(v); }
  function el(id){ return document.getElementById(id); }
  // the media URL a catalogue item carries (ready for real photos/videos when the media layer lands)
  function mediaUrl(x){ return (x && (x.image || x.img || x.photo || x.thumbnail || (Array.isArray(x.media) && x.media[0] && (x.media[0].url || x.media[0])))) || ''; }
  function swatch(c){ return '<span class="dot" title="'+esc((c.name||'')+' '+(c.hex||''))+'" style="background:'+esc(c.hex||'#ccc')+'"></span>'; }
  function comboHtml(cm){ return '<div class="combo"><span class="dots">'+((cm.colours||[]).map(swatch).join(''))+'</span><span class="cbname">'+esc(cm.name||'')+'</span></div>'; }
  function finishCard(it){
    var m = mediaUrl(it);
    var thumb = m ? '<img class="thumb" loading="lazy" src="'+esc(m)+'" alt="'+esc(it.name||'')+'">' : '<div class="noimg">🎨</div>';
    var combos = (it.combinations||[]).slice(0,3).map(comboHtml).join('');
    return '<div class="card">'+thumb+'<div class="cbody">'
      + '<div class="fname">'+esc(it.name||'Finish')+'</div>'
      + (it.scale||it.sheen ? '<div class="meta">'+esc(it.scale||'')+(it.sheen?(' · '+esc(it.sheen)):'')+'</div>' : '')
      + (combos ? '<div class="cclabel">Colour combinations</div>'+combos : '')
      + (it.price!=null ? '<div class="price">'+price(it.price)+'</div>' : '')
      + '</div></div>';
  }
  function productCard(p){
    var d = (p && (p.item_data || p)) || {};
    var m = mediaUrl(d);
    var thumb = m ? '<img class="thumb" loading="lazy" src="'+esc(m)+'" alt="'+esc(d.name||'')+'">' : '<div class="noimg">📦</div>';
    return '<div class="card">'+thumb+'<div class="cbody"><div class="fname">'+esc(d.name||d.product||'Item')+'</div>'
      + (d.unit ? '<div class="meta">'+esc(d.unit)+'</div>' : '')
      + (d.price!=null ? '<div class="price">'+price(d.price)+'</div>' : '')
      + '</div></div>';
  }
  function render(data){
    var shop = data.shop || {};
    CUR = shop.currency_code || 'INR';
    var head = '';
    if (BRAND) {
      head = '<div class="brand"><div class="logo">🎨</div><div style="flex:1;min-width:0"><div class="bname">'+esc(shop.display_name||'Catalogue')+'</div>'
        + '<div class="bmeta">'+esc(shop.bridge_id||'')+(shop.address?(' · '+esc(shop.address)):'')+'</div></div>'
        + (shop.is_verified?'<span class="badge">✓ Verified</span>':'') + '</div>';
    }
    var out = head;
    var finishes = data.finishes || [];
    finishes.forEach(function(f){
      out += '<div class="sechd">'+esc(f.title || f.collection || 'Designer finishes')+'</div>'
        + '<div class="grid">' + (f.items||[]).map(finishCard).join('') + '</div>';
    });
    var prods = data.items || [];
    if (prods.length) out += '<div class="sechd">Products</div><div class="grid">' + prods.map(productCard).join('') + '</div>';
    if (!finishes.length && !prods.length) out = head + '<div class="empty">This catalogue has no published items yet.</div>';
    if (BRAND) out += '<div class="foot">Live catalogue</div>';
    el('app').innerHTML = out;
    postHeight();
  }
  // let the host page auto-size the iframe (optional; they listen for message.cbEmbedHeight)
  function postHeight(){ try{ if (window.parent && window.parent !== window) window.parent.postMessage({ cbEmbedHeight: document.documentElement.scrollHeight, bridge: BRIDGE }, '*'); } catch(_){ } }
  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);
  if (!BRIDGE) { el('app').innerHTML = '<div class="empty">No catalogue specified. Add <code>?bridge=YOUR_BRIDGE_ID</code>.</div>'; return; }
  fetch(API + '/api/catalogue/' + encodeURIComponent(BRIDGE))
    .then(function(r){ if(!r.ok) throw new Error('not found'); return r.json(); })
    .then(render)
    .catch(function(){ el('app').innerHTML = '<div class="empty">Catalogue unavailable.</div>'; });
})();
</script>
</body>
</html>
