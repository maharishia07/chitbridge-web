<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320" role="img" aria-label="Compose and author a chit">
  <!-- subject: compose-author — a chit authored from the entity schema, pen in hand -->
  <rect x="10" y="10" width="460" height="300" rx="18" fill="#F7F4EE" stroke="#E4DECF"/>
  <!-- schema source panel (faint, behind) -->
  <g transform="translate(40,64)" opacity="0.7">
    <rect x="0" y="0" width="120" height="170" rx="10" fill="#EFF3F1" stroke="#D5DED9"/>
    <text x="14" y="26" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#6E8A7C">schema</text>
    <rect x="14" y="40" width="92" height="7" rx="3.5" fill="#CFDDD6"/>
    <rect x="14" y="58" width="74" height="7" rx="3.5" fill="#CFDDD6"/>
    <rect x="14" y="76" width="92" height="7" rx="3.5" fill="#CFDDD6"/>
    <rect x="14" y="94" width="60" height="7" rx="3.5" fill="#CFDDD6"/>
  </g>
  <!-- projection arrow -->
  <path d="M168 150 h40" fill="none" stroke="#3F66A6" stroke-width="2.5" stroke-linecap="round" marker-end="url(#ar)"/>
  <defs><marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#3F66A6"/></marker></defs>
  <!-- chit being authored -->
  <g transform="translate(220,56)">
    <rect x="0" y="0" width="190" height="190" rx="12" fill="#FFFFFF" stroke="#D9E2E8"/>
    <rect x="0" y="0" width="190" height="32" rx="12" fill="#3F66A6"/>
    <rect x="0" y="20" width="190" height="12" fill="#3F66A6"/>
    <rect x="18" y="14" width="90" height="8" rx="4" fill="#CDE0F4"/>
    <rect x="18" y="52" width="150" height="8" rx="4" fill="#E1E8ED"/>
    <rect x="18" y="74" width="120" height="8" rx="4" fill="#E1E8ED"/>
    <rect x="18" y="104" width="154" height="8" rx="4" fill="#EDE6D6"/>
    <!-- last line being written -->
    <rect x="18" y="126" width="70" height="8" rx="4" fill="#C08A2E"/>
  </g>
  <!-- pen -->
  <g transform="translate(300,176) rotate(40)">
    <rect x="0" y="0" width="14" height="80" rx="4" fill="#3F66A6"/>
    <rect x="0" y="0" width="14" height="20" rx="4" fill="#2C4D85"/>
    <path d="M0 80 L14 80 L7 98 z" fill="#C08A2E"/>
    <path d="M5 92 L9 92 L7 98 z" fill="#243441"/>
  </g>
</svg>
