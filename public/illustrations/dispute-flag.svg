<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320" role="img" aria-label="Dispute flag raised">
  <!-- subject: dispute-flag — a chit with a raised flag and the two-sided scales of resolution -->
  <rect x="10" y="10" width="460" height="300" rx="18" fill="#F7F4EE" stroke="#E4DECF"/>
  <!-- chit card -->
  <g transform="translate(70,96)">
    <rect x="0" y="0" width="200" height="150" rx="12" fill="#FFFFFF" stroke="#D9E2E8"/>
    <rect x="0" y="0" width="200" height="32" rx="12" fill="#C2473F"/>
    <rect x="0" y="20" width="200" height="12" fill="#C2473F"/>
    <rect x="18" y="50" width="150" height="8" rx="4" fill="#E1E8ED"/>
    <rect x="18" y="72" width="120" height="8" rx="4" fill="#E1E8ED"/>
    <rect x="18" y="100" width="164" height="8" rx="4" fill="#F4D9D6"/>
    <rect x="18" y="120" width="90" height="8" rx="4" fill="#F4D9D6"/>
  </g>
  <!-- planted flag -->
  <g transform="translate(248,52)">
    <line x1="0" y1="0" x2="0" y2="92" stroke="#7E8A91" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 4 L52 14 L40 26 L52 40 L0 32 Z" fill="#C2473F" stroke="#9E332C" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  <!-- scales of resolution -->
  <g transform="translate(330,150)" stroke="#3F66A6" stroke-width="3" fill="none" stroke-linecap="round">
    <line x1="40" y1="6" x2="40" y2="78"/>
    <line x1="12" y1="20" x2="68" y2="20"/>
    <circle cx="40" cy="6" r="4" fill="#3F66A6"/>
    <path d="M12 20 l-10 22 a14 9 0 0 0 20 0 z" fill="#E9F0F8"/>
    <path d="M68 20 l-10 22 a14 9 0 0 0 20 0 z" fill="#E9F0F8"/>
    <line x1="24" y1="78" x2="56" y2="78"/>
  </g>
</svg>
