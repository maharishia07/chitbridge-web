<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chit &amp; Bridge — app (build)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0F2E3D;--blue:#3F66A6;--blue-d:#345488;--gold:#C9A86A;--gold-soft:#F7F1E4;--gold-line:#E8D9BC;--paper:#FAF8F4;--card:#fff;--line:#E7E2D8;--grey:#7C8085;--ok:#2f8f5b;--prog:#9a7b34;--disp:#b4453f;--shadow:0 1px 2px rgba(15,46,61,.05),0 12px 34px rgba(15,46,61,.08)}
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  button,input,select{font:inherit}button{cursor:pointer}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#cfc7b8;border-radius:6px}
  #root{height:100vh;display:flex;flex-direction:column}
  .mono{font-family:'Space Mono'}.disp{font-family:'Space Grotesk'}

  /* mode ribbon */
  .moderibbon{background:var(--gold-soft);border-bottom:1px solid var(--gold-line);color:#6b5a36;font-size:11px;font-weight:600;padding:5px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .moderibbon b{font-family:'Space Grotesk'}
  .moderibbon .pill{background:#fff;border:1px solid var(--gold-line);border-radius:20px;padding:2px 9px;font-size:10px}
  .moderibbon .sw{margin-left:auto;display:flex;gap:6px}
  .moderibbon .sw button{border:1px solid var(--gold-line);background:#fff;border-radius:7px;font-size:10.5px;font-weight:700;padding:4px 9px;color:#6b5a36}
  .moderibbon .sw button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .moderibbon .sw button:disabled{opacity:.42;cursor:not-allowed}
  /* Welcome (pre-register) */
  .welwrap{max-width:860px;margin:0 auto;padding:6px 18px 70px}
  .weltop{display:flex;align-items:center;justify-content:space-between;padding:10px 0 6px}
  .welsignin{font-size:13px;color:var(--blue);border:1px solid var(--line);border-radius:8px;padding:7px 13px;background:#fff;cursor:pointer}
  .welhero{text-align:center;padding:14px 0 6px}
  .welhero h1{font-family:'Space Grotesk';font-size:26px;font-weight:600;letter-spacing:-.02em;margin:6px auto;line-height:1.15;max-width:24ch}
  .welhero p{color:var(--grey);font-size:14.5px;max-width:60ch;margin:0 auto}
.welhero-cta{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:18px}
.welhero-cta-sub{color:var(--grey);font-size:12px}
  .welcaps{display:flex;gap:12px;flex-wrap:wrap;margin:20px 0}
  .welcap{flex:1;min-width:200px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px}
  .welcap .ci{font-size:20px}.welcap .cn{font-family:'Space Grotesk';font-weight:600;font-size:14.5px;margin:7px 0 3px}.welcap .cd{font-size:12.5px;color:var(--grey)}
  .welsec{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;margin:14px 0}
  .welh2{font-family:'Space Grotesk';font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);font-weight:700;margin-bottom:4px}
  .welsub{font-size:12.5px;color:var(--grey);margin-bottom:12px}
  .welgrid{display:flex;gap:12px;flex-wrap:wrap}
  .welrole,.welbp{flex:1;min-width:220px;border:1.5px solid var(--line);border-radius:13px;padding:15px;cursor:pointer;transition:.15s;background:#fff}
  .welrole:hover,.welbp:hover{border-color:var(--blue);transform:translateY(-1px)}
  .welrole.sel,.welbp.sel{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,106,.22)}
  .welrole .ci{font-size:21px}.welrole .cn,.welbp .cn{font-family:'Space Grotesk';font-weight:600;font-size:15px;margin:5px 0 2px}
  .welrole .cd,.welbp .cd{font-size:12.5px;color:var(--grey)}.welbp .bt{font-size:11px;color:var(--grey);font-family:'Space Mono'}
  .welbtns{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
  .welwrap .btn.ghost{background:transparent;color:var(--blue);border:1px solid var(--line)}
  .welwrap .btn:disabled{background:#c7cdd2;cursor:not-allowed}
  .welfoot{color:var(--grey);font-size:11.5px;margin-top:20px;text-align:center;border-top:1px solid var(--line);padding-top:12px}
  .rchosen{background:#f3f6fb;border:1px solid #d7e2f1;border-radius:11px;padding:10px 13px;font-size:13px;margin-bottom:14px}
  .welpips{display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin:8px 0 2px}
  .welpip{font-size:11px;font-family:'Space Mono';color:var(--grey);background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 11px}
  .welpip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .welsplit{display:flex;gap:12px;flex-wrap:wrap;margin:14px 0}
  .welcol{flex:1;min-width:240px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px}
  .welcol.is{border-top:4px solid var(--blue)}.welcol.isnot{border-top:4px solid var(--gold)}
  .welcol ul{margin:8px 0 0;padding-left:17px}.welcol li{font-size:12.5px;margin:5px 0}
  .welask{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px;margin:14px 0}
  .welask-tag{font-size:10.5px;font-family:'Space Mono';background:var(--gold-soft);color:#7a5e22;border-radius:5px;padding:1px 7px;margin-left:6px}
  .welchips{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}
  .welchip{font-size:12px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 11px;cursor:pointer;color:var(--ink)}
  .welchip:hover{border-color:var(--blue)}
  .welask-row{display:flex;gap:8px;margin-top:6px}.welask-row .inp{flex:1}
  .welask-ans{font-size:13px;color:var(--ink);margin-top:10px;line-height:1.5}

  /* auth screens */
  .auth{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;overflow-y:auto;background:linear-gradient(160deg,#0F2E3D,#143b4e 60%,#1d4d61)}
  .card{width:440px;max-width:100%;background:#fff;border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
  .card .top{padding:22px 26px 8px;text-align:center}
  .brand{display:inline-flex;align-items:center;gap:10px;font-family:'Space Grotesk';font-weight:700;font-size:18px}
  .card h1{font-family:'Space Grotesk';font-size:20px;margin:14px 0 4px}.card .sub{font-size:12.5px;color:var(--grey);margin:0}
  .card .body{padding:8px 26px 24px}
  .tabs{display:flex;gap:4px;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:4px;margin:14px 0}
  .tabs button{flex:1;border:0;background:none;color:var(--grey);font-size:12px;font-weight:700;padding:9px 6px;border-radius:8px}
  .tabs button.on{background:#fff;color:var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.07)}
  label.fl{display:block;font-size:11px;font-weight:700;color:var(--grey);margin:12px 0 5px;text-transform:uppercase;letter-spacing:.04em}
  .inp{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14px;outline:0;background:var(--paper)}
  .inp:focus{border-color:var(--blue);background:#fff}
  .row2{display:flex;gap:10px}.row2>div{flex:1}
  .btn{width:100%;border:0;border-radius:11px;padding:13px;font-weight:700;font-size:14px;margin-top:16px;background:var(--ink);color:#fff}
  .btn.gold{background:linear-gradient(90deg,var(--gold),#b8945a);color:#3a2e16}
  .btn:disabled{opacity:.5}
  .swap{text-align:center;font-size:12.5px;color:var(--grey);margin-top:14px}.swap a{color:var(--blue);font-weight:700;cursor:pointer}
  .hint{font-size:11px;color:#9a7b34;background:var(--gold-soft);border:1px solid var(--gold-line);border-radius:9px;padding:9px 11px;margin-top:12px;line-height:1.5}
  .err{font-size:12px;color:var(--disp);background:#fbeeed;border:1px solid #e7b9b5;border-radius:9px;padding:9px 11px;margin-top:12px}

  /* app shell */
  .shell{flex:1;display:grid;grid-template-columns:212px 1fr;grid-template-rows:auto 1fr;min-height:0}
  .topbar{grid-column:1/3;height:52px;display:flex;align-items:center;gap:12px;padding:0 16px;background:var(--ink);color:#fff}
  .topbar .b{display:flex;align-items:center;gap:9px;font-family:'Space Grotesk';font-weight:700;font-size:14px}
  .topbar .who{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12px}
  .topbar .who .nm{font-weight:700}.topbar .who .rl{color:#9fb4bf;font-size:11px}
  .topbar .who .av{width:30px;height:30px;border-radius:50%;background:var(--gold);color:#3a2e16;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Space Grotesk'}
  .topbar .so{border:1px solid rgba(255,255,255,.25);background:none;color:#cfe0e8;border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
  .topbar .so:hover{background:rgba(255,255,255,.08)}
  .dutytog,.shoptog{display:flex;border-radius:9px;overflow:hidden;border:1px solid rgba(255,255,255,.18)}
  .dutytog button,.shoptog button{border:0;background:rgba(255,255,255,.05);color:#bcccd6;font-size:11px;font-weight:700;padding:6px 10px;display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap}
  .dutytog button.on.duty,.shoptog button.on.open{background:#1f7a4d;color:#fff}
  .dutytog button.on.brk,.shoptog button.on.away{background:var(--gold);color:#2c2410}
  .shoptog button.on.closed{background:#9a4040;color:#fff}
  .topbar .b .bt{margin-left:2px}
  .topbar .lo{border:1px solid rgba(255,255,255,.25);background:none;color:#cfe0e8;border-radius:8px;font-size:11px;font-weight:700;padding:6px 10px}
  .topbar .ham{display:none;border:0;background:none;color:#fff;font-size:20px}

  .menu{background:#0F2E3D;color:#bcccd6;padding:12px 10px;display:flex;flex-direction:column;overflow-y:auto;border-top:1px solid rgba(255,255,255,.06)}
  .menu .grp{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#5f7d8c;margin:10px 8px 5px}
  .menu button{display:flex;align-items:center;gap:10px;border:0;background:none;color:#bcccd6;text-align:left;font-size:13px;font-weight:500;padding:9px 10px;border-radius:9px;width:100%}
  .menu button .ic{width:16px;text-align:center}.menu button .ct{margin-left:auto;font-size:9.5px;background:rgba(255,255,255,.12);border-radius:10px;padding:1px 6px}
  .menu button:hover{background:rgba(255,255,255,.06)}.menu button.on{background:var(--blue);color:#fff}
  .menu .tagl{margin-top:auto;font-size:9.5px;color:#6f8b99;line-height:1.5;padding:8px}

  .main{min-width:0;display:flex;flex-direction:column;overflow:hidden;background:var(--paper)}
  .purpose{display:flex;align-items:center;gap:10px;padding:0 16px;max-height:0;overflow:hidden;background:#fff;font-size:12px;color:var(--mut,#5d6b73);transition:max-height .22s ease,padding .22s ease}
  .purpose.open{max-height:90px;padding:9px 16px;border-bottom:1px solid var(--line)}
  .purpose b{font-family:'Space Grotesk';color:var(--ink)}
  .purpose .x{margin-left:auto;border:0;background:none;color:var(--grey);font-size:14px;cursor:pointer}
  .topbar .info{border:0;background:none;color:#9fb4bf;font-size:16px;cursor:pointer;padding:2px 5px;line-height:1}
  .topbar .info.on{color:var(--gold)}

  .panel{flex:1;display:grid;grid-template-columns:var(--lw,340px) 7px minmax(0,1fr);min-height:0;position:relative}
  .list{display:flex;flex-direction:column;min-width:0;min-height:0;background:#fff}
  .lh{padding:10px 12px;border-bottom:1px solid var(--line)}
  .folders{display:flex;gap:4px;margin-bottom:8px}
  .folders button{flex:1;border:1px solid var(--line);background:var(--paper);color:var(--grey);font-size:12px;font-weight:700;padding:8px;border-radius:8px}
  .folders button.on{background:var(--blue);color:#fff;border-color:var(--blue)}
  .statetabs{display:flex;gap:3px;background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:3px;margin-bottom:8px}
  .statetabs button{flex:1;border:0;background:none;color:var(--grey);font-size:11px;font-weight:700;padding:6px;border-radius:6px;display:flex;align-items:center;justify-content:center;gap:5px}
  .statetabs button.on{background:#E3EDF8;color:var(--blue);box-shadow:inset 0 0 0 1.6px var(--blue);font-weight:800}
  .statetabs button.on .n{background:var(--blue);color:#fff}
  .statetabs .n{font-size:9px;background:rgba(0,0,0,.06);border-radius:9px;padding:0 5px}
  .srch{display:flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:12.5px;color:var(--grey)}
  .srch input{border:0;background:none;outline:0;font-size:12.5px;width:100%;color:var(--ink)}
  .tools{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
  .tool{width:30px;height:30px;border:1px solid var(--line);background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#54616a;position:relative}
  .tool.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .topbar .bell{position:relative;border:0;background:none;color:#cfe0e8;font-size:16px;cursor:pointer;padding:2px 4px;line-height:1}
  .topbar .bell .bdot{position:absolute;top:-2px;right:-3px;background:#d65a5a;color:#fff;font-size:8px;font-weight:800;min-width:13px;height:13px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px}
  .filterpanel{margin-top:8px;border:1px solid var(--line);border-radius:9px;background:#fff;padding:9px 11px;display:flex;flex-direction:column;gap:7px;font-size:12px}
  .filterpanel .fp-row{display:flex;align-items:center;gap:9px;justify-content:space-between}
  .filterpanel select{font-size:12px;padding:4px 6px;border:1px solid var(--line);border-radius:6px;background:#fff}
  .filterpanel label{display:flex;align-items:center;gap:6px;cursor:pointer}
  .filterpanel .fp-foot{display:flex;align-items:center;gap:10px;border-top:1px solid var(--line);padding-top:7px}
  .filterpanel .fp-foot button{border:1px solid var(--line);background:#fff;border-radius:7px;font-size:11px;font-weight:700;padding:4px 10px;color:var(--blue);cursor:pointer}
  .filterpanel .fp-note{margin-left:auto;font-size:9px;color:var(--grey);font-family:'Space Mono',monospace}
  .notifover{position:fixed;inset:0;z-index:250;background:rgba(8,24,32,.18)}
  .notifpanel{position:absolute;top:54px;right:14px;width:300px;max-width:88vw;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
  .notifhd{display:flex;align-items:center;font-family:'Space Grotesk';font-weight:700;font-size:13px;color:var(--ink);padding:11px 13px;border-bottom:1px solid var(--line)}
  .notifrow{display:flex;gap:10px;padding:10px 13px;border-bottom:1px solid var(--line)}
  .notifrow .ni{font-size:15px}.notifrow .nt{font-size:12.5px;color:var(--ink);line-height:1.35}.notifrow .ns{font-size:10px;color:var(--grey);margin-top:2px}
  .notiffoot{padding:8px 13px;font-size:10px;color:var(--grey);background:var(--paper)}
  .mover{position:fixed;inset:0;z-index:280;background:rgba(8,24,32,.45);display:flex;align-items:flex-start;justify-content:center;padding:56px 16px;overflow-y:auto}
  .composepill{position:fixed;left:16px;bottom:16px;z-index:300;background:var(--blue);color:#fff;border-radius:999px;padding:9px 15px;font-size:13px;font-weight:700;box-shadow:0 8px 22px rgba(0,0,0,.28);display:flex;align-items:center;gap:10px}
  .ccsugg{margin-top:4px;max-height:200px;overflow-y:auto}
  .ccsugg-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 10px;cursor:pointer;border:1px solid var(--line);border-top:0;background:#fff}
  .ccsugg-item:first-child{border-top:1px solid var(--line);border-radius:8px 8px 0 0}
  .ccsugg-item:last-child{border-radius:0 0 8px 8px}
  .ccsugg-item:hover{background:#EEF3FB}
  .ccsugg-nm{font-size:12.5px;color:var(--ink)}
  .ccsugg-id{font-size:10px;font-family:monospace;color:var(--grey);white-space:nowrap}
  .ccsugg-empty{padding:6px 10px;font-size:11px;color:var(--grey);border:1px solid var(--line);border-radius:8px;background:#fff}
  .modal{width:360px;max-width:94vw;background:#fff;border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
  .modal.wide{width:820px;max-width:94vw}
  .cc-cols{display:grid;grid-template-columns:var(--cc-lw,1fr) 14px minmax(0,1fr);gap:0;align-items:start}
  .cc-col{min-width:0}
  .cc-rtabs{display:flex;gap:5px;margin:2px 0 8px;flex-wrap:wrap}
  .cc-rtab{border:1px solid var(--line);background:#fff;border-radius:7px;font-size:11px;font-weight:700;padding:4px 9px;color:var(--grey);cursor:pointer}
  .cc-rtab.on{background:#EEF3FB;color:var(--blue);border-color:var(--blue)}
  .ccsum-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12.5px;color:var(--ink)}
  .cc-gutter{align-self:stretch;width:14px;cursor:col-resize;position:relative}
  .cc-gutter::before{content:"";position:absolute;left:6px;top:2px;bottom:2px;width:2px;background:var(--line);border-radius:2px}
  .cc-gutter:hover::before{background:var(--blue);width:3px;left:5px}
  @media (max-width:680px){ .cc-cols{grid-template-columns:1fr} .cc-gutter{display:none} }
  .modal.wide .mbody{max-height:72vh}
  @media (max-width:680px){ .mover{padding:18px 7px} .modal.wide{width:97vw;max-width:97vw} .modal.wide .mbody{max-height:80vh} .modal .mbody{max-height:74vh} }
  .modal .mhd{padding:13px 16px;border-bottom:1px solid var(--line)}
  .modal .mhd .t{font-family:'Space Grotesk';font-weight:700;font-size:15px;color:var(--ink)}
  .modal .mhd .s{font-size:12px;color:var(--grey);margin-top:2px}
  .modal .mbody{padding:11px 12px;max-height:54vh;overflow-y:auto}
  .modal .mfoot{display:flex;gap:8px;padding:11px 13px;border-top:1px solid var(--line)}
  .modal .mfoot button{flex:1;border:1px solid var(--line);background:#fff;border-radius:9px;font-size:13px;font-weight:700;padding:9px;cursor:pointer;color:var(--ink)}
  .modal .mfoot button.pri{background:var(--blue);color:#fff;border-color:var(--blue)}
  .modal .mfoot button.danger{background:var(--disp);color:#fff;border-color:var(--disp)}
  .modal .mfoot button:disabled{opacity:.45;cursor:not-allowed}
  .modal textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px;font:inherit;font-size:13px;resize:vertical;min-height:62px;box-sizing:border-box}
  .optrow{display:flex;align-items:center;gap:11px;padding:10px 11px;border:1px solid var(--line);border-radius:10px;margin-bottom:6px;cursor:pointer}
  .optrow.sel{border:2px solid var(--blue);background:#EAF1F8}
  .optrow.dis{opacity:.5;cursor:not-allowed}
  .optrow .rdo{width:16px;height:16px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;display:flex;align-items:center;justify-content:center}
  .optrow.sel .rdo{border-color:var(--blue)}
  .optrow.sel .rdo::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--blue)}
  .optrow .oc{flex:1;min-width:0}.optrow .on{font-size:13px;font-weight:700;color:var(--ink)}.optrow .om{font-size:11px;color:var(--grey)}
  .optchip{font-size:9.5px;font-weight:700;border-radius:8px;padding:2px 8px;white-space:nowrap}
  .optchip.on{color:#1f7a4d;background:#e3f3ea}.optchip.brk{color:#8a6d1f;background:#f6edd6}.optchip.off{color:#777;background:#eee}
  .dtabs{flex-wrap:wrap}
  .dh{position:relative}
  .dmsg{position:absolute;top:0;right:0;border:1px solid #cfe0ec;background:#EAF1F6;color:var(--blue);font-size:11px;font-weight:700;border-radius:8px;padding:3px 9px;cursor:pointer}
  .rowmsg{font-size:9px;font-weight:700;color:#3f66a6;background:#EAF1F6;border:0.5px solid #cfe0ec;border-radius:5px;padding:0 5px;white-space:nowrap;cursor:pointer}
  .msglink{border:1px solid var(--line);background:#fff;color:var(--blue);font-size:12px;font-weight:700;border-radius:9px;padding:8px 13px;cursor:pointer}
  .msgtab{display:flex;flex-direction:column}

<script>
/* =========================================================================
   CHIT & BRIDGE — separate build (Registration → Login → Menu → Task Panel)
   Single self-contained SPA. Deploy to its OWN URL (does not touch the
   existing front end). Runs standalone in WEB DEMO (mock data); switch stage (Dev/UAT/Live) for the real API.
   ========================================================================= */

/* ---- CONFIG: the only block to edit when wiring to the backend ----
   STAGE = the promotion ladder. ONE source of truth: CFG.STAGE.
     web_demo → front-end only, mock data (no API)
     dev / uat / live → the SAME real-API code path, pointed at three backends (differ only by base URL)
   MODE + API_BASE are DERIVED from STAGE, so the shared client (core.js) needs no change. */
const STAGES = {
  dev:      { label:"Dev",      mock:false, base:"https://chitbridge-api-production.up.railway.app",  note:"real API · dev database" },
  uat:      { label:"UAT",      mock:false, base:"",   /* TODO: UAT cloud API base */                 note:"real API · UAT cloud" },
  live:     { label:"Live",     mock:false, base:"",   /* TODO: production API base */                note:"production" },
};
const CFG = {
  STAGE: "dev",                                                     // points at the live dev API (Railway). Flip in the build-preview ribbon if present.
  ASSIST_LLM: false,                                                // tier-1 LLM for the assistant — OFF until the /api/assist proxy exists; answer() falls through to the library floor.
  get MODE(){ return STAGES[this.STAGE].mock ? "demo" : "live"; },  // compat shim: core.js still reads CFG.MODE
  get API_BASE(){ return STAGES[this.STAGE].base || ""; },          // derived from the current stage
};
/* Endpoint map. ✓ = matches build registry · ? = ASSUMED, confirm before live.
   Correct any path here in ONE place. */
const EP = {
  // --- assistant tier-1 LLM proxy — NOT BUILT yet; gated off via CFG.ASSIST_LLM. The model key stays SERVER-side. ---
  assist:          {m:"POST", p:"/api/assist",                  ok:"?"},  // backend proxies to the model (no-oversell prompt + library grounding)
  assistQuestions: {m:"GET",  p:"/api/assist/questions",        ok:"y"},  // DB-backed Q&A library, context-filtered (?context=screen). Single source; feeds the AI too.
  assistGap:       {m:"POST", p:"/api/assist/gap",              ok:"y"},  // capture an unanswered question as a draft (learning feedback)
  assistGaps:      {m:"GET",  p:"/api/assist/gaps",             ok:"y"},  // review queue — captured gaps awaiting an answer
  assistResolve:   {m:"POST", p:"/api/assist/resolve",          ok:"y"},  // approve (with answer) / reject a gap
  assistPublish:   {m:"POST", p:"/api/assist/publish",          ok:"y"},  // help desk publishes a Q&A to its catalogue (serves live)
  assistWhoami:    {m:"GET",  p:"/api/assist/whoami",            ok:"y"},  // is the logged-in entity a helpdesk instance?
  // --- repointed to real chitbridge-api routes (trace 2026-06-25). See FINDINGS.md. ---
  register:        {m:"POST", p:"/api/entities/register",        ok:"✓"},  // OTP request (register doubles as owner login)
  ownerLogin:      {m:"POST", p:"/api/entities/register",        ok:"✓"},  // same route — returning owner requests OTP (pass mode:'login')
  ownerVerify:     {m:"POST", p:"/api/entities/verify",          ok:"✓"},  // verify OTP → token
  actorLogin:      {m:"POST", p:"/api/actors/login",             ok:"✓"},  // actor PIN
  actorCheck:      {m:"GET",  p:"/api/actors/check-login",      ok:"✓"},  // ?username= -> {valid,has_pin}
  setPin:          {m:"POST", p:"/api/actors/set-pin",          ok:"✓"},  // first-time actor sets PIN
  custCatalogue:   {m:"GET",  p:"/api/catalogue/:bridgeId",      ok:"✓"},
  custVerify:      {m:"POST", p:"/api/catalogue/:bridgeId/login/verify", ok:"✓"},
  custOrders:      {m:"GET",  p:"/api/catalogue/:bridgeId/my-orders",     ok:"✓"},
  inbox:           {m:"GET",  p:"/api/chits/inbox",              ok:"✓"},  // ?status= ?page= ?limit=
  sent:            {m:"GET",  p:"/api/chits/sent",               ok:"✓"},  // real sent copies (direction='sent') — baseline-4. (was wrongly /inbox = received copies)
  chit:            {m:"GET",  p:"/api/chits/:id",                ok:"✓"},
  advance:         {m:"PUT",  p:"/api/chits/:id/status",         ok:"✓"},  // state change is via PUT /status (no /advance route)
  status:          {m:"PUT",  p:"/api/chits/:id/status",         ok:"✓"},
  assign:          {m:"PUT",  p:"/api/actors/assign/:id",        ok:"✓"},  // body {action:'push', target_actor_id}
  unassign:        {m:"PUT",  p:"/api/actors/assign/:id",        ok:"✓"},  // SAME route — body {action:'return'}
  setPriority:     {m:"PUT",  p:"/api/chits/:id/priority",       ok:"✓"},  // {priority,reason} internal — built (baseline-2)
  custFlag:        {m:"PUT",  p:"/api/chits/:id/priority-flag",  ok:"✓"},  // {flag} customer request, write-once — built (baseline-2)
  actors:          {m:"GET",  p:"/api/actors",                   ok:"✓"},
  actorBreak:      {m:"PUT",  p:"/api/actors/break",             ok:"✓"},
  actorStatus:     {m:"PUT",  p:"/api/actors/:id/status",        ok:"✓"},  // deactivate/remove/reactivate (+ task routing)
  actorOtp:        {m:"POST", p:"/api/actors/:id/otp",           ok:"✓"},  // regenerate OTP (re-invite)
  actorPinReset:   {m:"DELETE",p:"/api/actors/:id/pin",          ok:"✓"},  // reset PIN

  actorDelegate:   {m:"PUT",   p:"/api/actors/:id/delegate",     ok:"y"},  // D1 — set leave-cover delegate (loop-checked)
  changePin:       {m:"PUT",   p:"/api/actors/change-pin",       ok:"✓"},  // actor changes own PIN (current -> new)
  shopStatus:      {m:"PATCH",p:"/api/entities/profile",         ok:"✓"},  // shop status = PATCH profile {business_status}
  dispute:         {m:"POST", p:"/api/chits/:id/disputes",       ok:"✓"},  // raise dispute (built)
  delChit:         {m:"DELETE",p:"/api/chits/:id",               ok:"✓"},  // exists (soft-void/trash)
  restore:         {m:"POST", p:"/api/chits/:id/restore",        ok:"✓"},  // undo soft-delete — baseline-11
  purgeChit:       {m:"DELETE", p:"/api/chits/:id/purge",        ok:"✓"},  // permanent hard-delete of a DRAFT only
  unread:          {m:"GET",  p:"/api/chits/unread",             ok:"✓"},  // per-actor unread chit_ids — baseline-11
  assignBulk:      {m:"POST", p:"/api/chits/assign-bulk",        ok:"✓"},  // built (baseline-4); frontend wire pending — panel-fixes #2
  filters:         {m:"GET",  p:"/api/chits/inbox?kind&dispute&sort", ok:"◐"}, // inbox exists; query-param support unverified
  notifications:   {m:"GET",  p:"/api/notifications",            ok:"✓"},  // mounted (baseline-4); enhanced baseline-8/9; wired to bell — panel-fixes #1
  // §2 messages ALREADY EXIST (chits.js); §7 priority + raid-report are new (build in Phase 1):
  messages:        {m:"GET",  p:"/api/chits/:id/messages",       ok:"✓"},  // ?type= (msg_type after fp01)
  sendMsg:         {m:"POST", p:"/api/chits/:id/messages",       ok:"✓"},  // body {thread_type, message_text, msg_type}

/* ── answer() — the single answer seam (the floating assistant AND the "?" overlays both go through this) ──────

async function answer(question, contextKey){

/* tier-1 LLM call — STUB, gated by CFG.ASSIST_LLM (off by default). The model key NEVER lives in the client:

   network / bad shape) falls through to matchLibrary — the assistant degrades, it never breaks. */
async function askLLM(question, contextKey){
  if(!(typeof CFG!=="undefined" && CFG.ASSIST_LLM)) return null;          // disabled → instant fall-through
  if(typeof CFG!=="undefined" && CFG.MODE==="demo") return null;          // never call the model from the no-login mock
  const r = await api('assist', { body:{ q:question, context:contextKey||curScreen(), stage:CFG.STAGE } });
  if(!r || !r.answer) return null;                                        // honest empty → fall through to the floor

// Common words that must NOT count as relevance (else "what is the status of X" false-matches on "what"/"status").
const ASSIST_STOP = new Set(["what","this","that","with","your","from","does","have","will","when","where","which","about","into","they","them","then","than","here","there","would","could","should","been","were","being","some","more","most","such","just","only","very","much","many","also","else","over","under","these","those","whose"]);
function matchLibrary(question, contextKey){
  const q=(question||"").toLowerCase(); if(!q) return null;
  const pool = contextKey ? ASSIST_LIB.filter(e=>(e.context||[]).indexOf(contextKey)>=0 || (e.context||[]).indexOf("*")>=0) : ASSIST_LIB.slice();
  const words = q.split(/\W+/).filter(w=>w.length>3 && !ASSIST_STOP.has(w));   // meaningful words only
  let best=null, score=0;
  pool.forEach(e=>{ let s=0; const hay=(e.q+" "+e.a).toLowerCase();
    (e.topics||[]).forEach(t=>{ if(q.indexOf(t.toLowerCase())>=0) s+=2; });     // curated topic phrase present -> strong signal
    words.forEach(w=>{ if(hay.indexOf(w)>=0) s++; });                            // non-stopword content overlap
    if(s>score){ score=s; best=e; } });
  return score>=2 ? best : null;   // floor: a topic hit or >=2 meaningful words. Below -> no answer -> capture the gap.
}

   Failures go through MSG.fail(verb, err) so wording is uniform across every panel. */
function friendlyErr(e){ const m=(e&&e.message)||String(e||"");
  if(/Already working/i.test(m))            return "still finishing the last one — one moment";
  if(/session expired|sign in/i.test(m))    return "your session expired — please sign in again";
  if(/Failed to fetch|network/i.test(m))    return "network hiccup — check your connection and retry";
  return m || "something went wrong";
}

window.addEventListener("hashchange", route);
function route(){
  try{ mountAssist(); }catch(_){}   // floating assistant on every page (auth + pre-auth)

  if(!SESSION.token && !h.startsWith("#/register") && !h.startsWith("#/login") && !h.startsWith("#/welcome") && !h.startsWith("#/legend")) return go("#/login");

async function doLogin(){
  const L=LOGIN;
  // capture inputs BEFORE the busy re-render (renderLogin rebuilds the form)
  const v_id=val("l_id"), v_otp=val("l_otp"), v_pin=val("l_pin"), v_setpin=val("l_setpin"), v_bridge=val("l_bridge")||"", v_cotp=val("l_cotp");
  if(L.step==="id" && v_id) L.id=v_id.trim();
  if(L.cust && v_bridge) L.id=v_bridge.trim();
  L.err=""; L.busy=true; renderLogin();
  try{
    if(L.cust){
      await api("custVerify",{params:{bridgeId:L.id},body:{otp:v_cotp}});
      setSession({token:"t",role:"customer",name:"Customer",entity:"",bridgeId:L.id});
      L.busy=false; return go("#/app");
    }
    if(L.step==="id"){
      const id=L.id;
      if(loginIsActor(id)){
        L.kind="actor";
        const r=await api("actorCheck",{query:{username:id.toLowerCase()}});
        if(r && r.valid===false){ L.busy=false; L.err="Co-assist not found — check username and entity name."; return renderLogin(); }
        L.hasPin = !!(r && r.has_pin);
        L.step = L.hasPin ? "pin" : "otp";
      } else {
        L.kind="entity";
        const r=await api("ownerLogin",{body:{display_name:id, email:id, mode:"login"}});
        L.email = (r && r.email) || id;
        L.step="otp";
      }
      L.busy=false; return renderLogin();
    }
    if(L.step==="otp"){
      if(L.kind==="actor"){
        const r=await api("actorLogin",{body:{username:L.id.toLowerCase(), otp:v_otp}});
        if(r && r.requires_pin_setup){ setSession({token:r.token||"",role:"actor"}); L.busy=false; L.step="setpin"; return renderLogin(); }
        setSession({token:r.token||"t",role:"actor",name:(r.actor&&r.actor.display_name)||r.name||L.id.split("@")[0],entity:(r.actor&&r.actor.parent_entity)||r.entity||L.id.split("@")[1]||"",duty:((r.actor&&r.actor.break_status&&r.actor.break_status!=='active')?'break':'duty')});
      } else {
        const r=await api("ownerVerify",{body:{email:L.email||L.id, otp:v_otp}});
        setSession(entFromVerify(r, L.id));
      }
      L.busy=false; return go("#/app");
    }

function ensureCap(name){
  if(CAP_LOADED[name]) return Promise.resolve();

    var s=document.createElement('script'); s.src='/app/cap-'+name+'.js'; s.async=false;
    s.onload=function(){ CAP_LOADED[name]=true; resolve(); };

/* ── universal client-side lazy list — reveals N rows at a time in ANY container ────────────
   IntersectionObserver auto-reveal + a "Show more" button fallback (never stuck) + total/end marker.
   For lists whose endpoint returns everything at once: lazyWrap(id, items, cardFn, emptyHtml). */
const LAZY = {};
function lazyWrap(id, items, cardFn, empty){ items = items || [];
  if(LAZY[id] && LAZY[id]._io){ try{ LAZY[id]._io.disconnect(); }catch(_){} }
  if(!items.length) return empty || '';
  const chunk = 50;
  LAZY[id] = { items, cardFn, chunk, shown: Math.min(chunk, items.length), total: items.length, _io:null };
  setTimeout(function(){ lazyAttach(id); }, 0);
  return items.slice(0, LAZY[id].shown).map(cardFn).join("") + lazyBar(id); }
function lazyBar(id){ const s=LAZY[id]; if(!s) return ''; const left=s.total-s.shown;
  const inner = left<=0 ? ('<div class="listend">'+s.total+' total · end of list</div>')
    : ('<div class="listend"><button class="composebtn" onclick="lazyReveal(\''+id+'\')">↓ Show '+Math.min(s.chunk,left)+' more</button> <span style="color:var(--grey)">'+s.shown+' of '+s.total+'</span></div>');
  return '<div class="lazysent" id="lzs_'+id+'">'+inner+'</div>'; }
function lazyReveal(id){ const s=LAZY[id]; if(!s) return; const sent=document.getElementById('lzs_'+id); if(!sent) return;
  const next=s.items.slice(s.shown, s.shown+s.chunk); if(next.length){ sent.insertAdjacentHTML('beforebegin', next.map(s.cardFn).join("")); s.shown+=next.length; }
  const left=s.total-s.shown;
  if(left<=0){ sent.innerHTML='<div class="listend">'+s.total+' total · end of list</div>'; if(s._io){ try{s._io.disconnect();}catch(_){} s._io=null; } }
  else sent.innerHTML='<div class="listend"><button class="composebtn" onclick="lazyReveal(\''+id+'\')">↓ Show '+Math.min(s.chunk,left)+' more</button> <span style="color:var(--grey)">'+s.shown+' of '+s.total+'</span></div>'; }
function lazyAttach(id){ const s=LAZY[id]; if(!s || s.shown>=s.total) return; const sent=document.getElementById('lzs_'+id); if(!sent) return;
  try{ s._io = new IntersectionObserver(function(es){ if(es.some(function(e){return e.isIntersecting;})) lazyReveal(id); }, {rootMargin:'0px'}); s._io.observe(sent); }catch(_){} }

/* ── generic lazy-list pager — ONE implementation for every scrollable list ────────────────
   pgInit(id,cfg): cfg = { el:()=>HTMLElement (scroll container), fetch:(page,limit)=>Promise(array, maybe .total),
     map:(row)=>row, store:(rows,first)=>void, count:()=>number, repaint:()=>void, limit:int }
   Behaviour: page 1 then more on scroll; total when the endpoint sends it, else "short page == last";
   never stuck (Load more fallback + ensure-filled); end-of-list marker. Used by: list (Task/Order), notif, msg. */
const PG = {};
function pgInit(id, cfg){ PG[id] = { cfg, page:0, total:0, loading:false, done:false }; }
function pgReset(id){ const p=PG[id]; if(p){ p.page=0; p.total=0; p.loading=false; p.done=false; } }
function pgDone(id){ const p=PG[id]; return !p || p.done; }
async function pgNext(id){ const p=PG[id]; if(!p||p.loading||p.done) return;
  p.loading=true; try{ p.cfg.repaint&&p.cfg.repaint(); }catch(_){}
  try{ const lim=p.cfg.limit||50; const res=await p.cfg.fetch(p.page+1, lim); const raw=(res||[]); const rows=p.cfg.map?raw.map(p.cfg.map):raw.slice();
    if(res&&res.total!=null) p.total=res.total; p.page++; p.cfg.store(rows, p.page===1);
    if(raw.length===0 || raw.length<lim || (p.total>0 && p.cfg.count()>=p.total)) p.done=true;
  }catch(_){ }
  finally{ p.loading=false; try{ p.cfg.repaint&&p.cfg.repaint(); }catch(_){}; } }
function pgFirst(id){ pgReset(id); return pgNext(id); }
function pgScroll(id){ const p=PG[id]; if(!p||p.loading||p.done)return; const el=p.cfg.el&&p.cfg.el(); if(!el)return; if(el.scrollTop+el.clientHeight >= el.scrollHeight-220) pgNext(id); }
function pgFill(id){ const p=PG[id]; if(!p||p.loading||p.done)return; const el=p.cfg.el&&p.cfg.el(); if(!el)return; if(el.scrollHeight <= el.clientHeight+8) pgNext(id); }
function pgTotalText(id){ const p=PG[id]; if(!p||!p.total)return ''; const shown=Math.min(p.cfg.count(),p.total); return 'Showing '+shown+' of '+p.total+(p.done?' · all loaded':' · scroll for more'); }
function pgFooter(id){ const p=PG[id]; if(!p)return ''; const c=p.cfg.count();
  if(p.loading) return '<div class="listend"><span class="spin"></span> loading more…'+(p.total>0?(' ('+c+'/'+p.total+')'):'')+'</div>';
  if(!p.done) return '<div class="listend"><button class="composebtn" onclick="pgNext(\''+id+'\')">↓ Load more</button>'+(p.total>0?('<span style="color:var(--grey)">'+c+' of '+p.total+' loaded</span>'):'')+'</div>';
  return '<div class="listend">— end of list'+(p.total>0?(' · '+p.total+' total'):'')+' —</div>'; }

// ── THE single definition of "what cursor/detail/counts do after ANY single-chit action" ──
// Usage: pos = chitPos(id) BEFORE the action; update local state; then afterChitAction(id, pos).
// Every action calls this, so the behaviour (email-style: keep if still visible, else next in queue) is identical
// everywhere — never re-implemented per action. See C:\dev\ASSOCIATION-RULES.md.
function chitPos(id){ return visibleRows().findIndex(function(x){return x.id===id;}); }
function afterChitAction(id, pos){
  paintRowsOnly();                                                        // repaint rows + tab counts in place (no reload)
  const vis=visibleRows();
  if(vis.some(function(x){return x.id===id;})){ paintDetail(); }          // still in view → detail follows it
  else { const nxt=vis[Math.min((pos==null||pos<0)?0:pos, vis.length-1)]; // left view → next in queue
    if(nxt){ openChit(nxt.id); } else { UI.sel=null; UI.detail=null; UI.mdetail=false; paintDetail(); } }
  refreshRollup();                                                        // counts = server truth, list undisturbed
}

async function advanceChit(id){
  const c=UI.rows.find(x=>x.id===id)||UI.detail; if(c&&c.state==="close"){toast("At Close — next is Archive (sunset model).");return;}
  const NB={pending:'accepted',delivered:'accepted',read:'accepted',accepted:'in_progress',in_progress:'completed',partial:'completed',finished:'completed'};
  const UIS={pending:'open',delivered:'open',read:'open',accepted:'act',in_progress:'act',partial:'act',completed:'close',cancelled:'close',rejected:'close'};
  const curB=(c&&c._status)||'pending', nextB=NB[curB];
  if(!nextB){ toast("Already at the final state."); return; }
  const fromUI=(c&&c.state)||UIS[curB]||'open';
  const pos=chitPos(id);
  try{ await api("advance",{params:{id},body:{status:nextB}});
    const i=UI.rows.findIndex(x=>x.id===id); if(i>=0){UI.rows[i]._status=nextB; UI.rows[i].state=UIS[nextB];}
    if(UI.detail&&UI.detail.id===id){UI.detail._status=nextB; UI.detail.state=UIS[nextB];}
    const toUI=UIS[nextB]||nextB;
    afterChitAction(id, pos);
    toast(MSG.advanced(c&&c.code, toUI)); announce(((c&&c.code)||'This chit')+' moved from '+cap(fromUI)+' to '+cap(toUI));
  }
  catch(e){ toast(MSG.fail("advance", e)); }
}

/* ── real attachments (platform-independent): bytes pulled ON DEMAND — GET /api/attachments/:id is auth'd, so fetch→blobURL ── */
function attType(mime,name){ mime=String(mime||''); name=String(name||'').toLowerCase(); if(mime.indexOf('image/')===0)return 'image'; if(mime.indexOf('video/')===0)return 'video'; if(mime==='application/pdf'||/\.pdf$/.test(name))return 'pdf'; if(/sheet|excel|csv/.test(mime)||/\.(xlsx|xls|csv)$/.test(name))return 'xlsx'; if(/word|document/.test(mime)||/\.(docx|doc)$/.test(name))return 'docx'; if(/zip|compress/.test(mime)||/\.zip$/.test(name))return 'zip'; return 'doc'; }

function lbDownload(){ try{ const atts=UI.attGroups[UI.lbGroup]||[]; const a=atts[UI.lb]; if(a&&a.src) window.open(a.src,'_blank','noopener'); else toast('No file URL (stub).'); }catch(_){} }
function paintLB(){
  const host=document.getElementById("lbhost");if(!host)return;
  const atts=UI.attGroups[UI.lbGroup]||[];
  if(UI.lb==null||!atts.length){host.innerHTML="";return;}
  const i=Math.min(UI.lb,atts.length-1),a=atts[i];
  host.innerHTML=`<div class="lbover" onclick="closeLightbox()"><div class="lbbox" onclick="event.stopPropagation()">
    <div class="lbtop"><span>${a.n}</span><span style="font-weight:400;color:#9fb4bf">${i+1} / ${atts.length}</span><span style="margin-left:auto;cursor:pointer" onclick="lbDownload()">⬇</span><span class="x" onclick="closeLightbox()">✕</span></div>
    <div class="lbstage">${attMedia(a,'lb')}</div>
    <div class="lbnav"><button onclick="lbNav(-1)" aria-label="Previous">‹</button><div class="lbdots">${atts.map((_,k)=>`<span class="${k===i?'on':''}"></span>`).join("")}</div><button onclick="lbNav(1)" aria-label="Next">›</button></div>
  </div></div>`;
  if(a&&a.id&&!a.src){ attResolveSrc(a); }
}

/* boot */
applyPrefs();
restoreSession();
try{ const _cw=JSON.parse(localStorage.getItem("cb_colw")||"null"); if(_cw) UI.colW=_cw; const _so=JSON.parse(localStorage.getItem("cb_sort")||"null"); if(_so&&_so.sort){ UI.sort=_so.sort; UI.dir=_so.dir||"desc"; } }catch(_){ }
try{ if(SESSION.token){ const _nv=localStorage.getItem("cb_nav"); if(_nv){ UI.nav=_nv; if(_nv==="order")UI.folder="order"; else if(["drafts","trash","archive"].indexOf(_nv)>=0)UI.folder=_nv; else if(_nv==="task")UI.folder="task"; } } }catch(_){ }
if(!location.hash) location.hash=SESSION.token?"#/":"#/login";
route();
</script>
</body>
</html>
